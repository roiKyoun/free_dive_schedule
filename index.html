<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FreeDive — 강습 예약</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  --bg:#050e1a;--card:#0e2040;--card2:#112248;
  --cyan:#00c8ec;--purple:#a78bfa;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;
  --t1:#e4f2f8;--t2:#6da8c4;--t3:#3a5f78;
  --b:rgba(0,200,236,.1);--b2:rgba(0,200,236,.28);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--t1);font-family:'DM Sans',sans-serif;min-height:100vh;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 60% 50% at 10% 15%,rgba(0,200,236,.06) 0%,transparent 70%),
             radial-gradient(ellipse 50% 40% at 90% 85%,rgba(167,139,250,.05) 0%,transparent 70%);}
header{position:sticky;top:0;z-index:50;background:rgba(5,14,26,.94);
  backdrop-filter:blur(18px);border-bottom:1px solid var(--b);
  padding:12px 18px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--cyan);
  text-shadow:0 0 20px rgba(0,200,236,.45);line-height:1;flex-shrink:0;}
.logo small{display:block;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:300;
  letter-spacing:2px;color:var(--t3);text-transform:uppercase;}
.hbtns{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:9px;
  border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;transition:all .18s;}
.btn-primary{background:var(--cyan);color:#050e1a;}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px);}
.btn-ghost{background:transparent;color:var(--t2);border:1px solid var(--b);}
.btn-ghost:hover{border-color:var(--b2);color:var(--t1);}
.btn-success{background:var(--green);color:#fff;}
.btn-success:hover{filter:brightness(1.08);}
.btn-danger{background:transparent;color:var(--red);border:1px solid rgba(239,68,68,.25);}
.btn-danger:hover{background:rgba(239,68,68,.1);}
.btn-warn{background:rgba(245,158,11,.15);color:var(--amber);border:1px solid rgba(245,158,11,.3);}
.btn-warn:hover{background:rgba(245,158,11,.25);}
.btn-sm{padding:4px 10px;font-size:11px;}
.btn-wide{width:100%;justify-content:center;}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important;filter:none!important;}
.lang-btn{background:rgba(0,200,236,.1);border:1px solid var(--b2);color:var(--cyan);
  border-radius:7px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;
  letter-spacing:.5px;transition:all .18s;}
.lang-btn:hover{background:rgba(0,200,236,.2);}
main{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:24px 14px 60px;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.cal-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;}
.nav-btn{background:transparent;border:1px solid var(--b);color:var(--t2);
  border-radius:8px;padding:5px 14px;cursor:pointer;font-size:17px;transition:all .18s;}
.nav-btn:hover{border-color:var(--b2);color:var(--t1);}
.legend{display:flex;gap:14px;flex-wrap:wrap;}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t2);}
.leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.dow{text-align:center;font-size:10px;font-weight:600;color:var(--t3);
  padding:5px 0;text-transform:uppercase;letter-spacing:.05em;}
.dow:first-child{color:#f87171;}.dow:last-child{color:#60a5fa;}
.day{background:var(--card2);border:1px solid var(--b);border-radius:9px;
  padding:6px 5px;min-height:68px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;}
.day:hover{border-color:var(--b2);transform:translateY(-1px);}
.day.empty{background:transparent;border-color:transparent;cursor:default;pointer-events:none;}
.day.past{opacity:.45;}
.day.today .dn{color:var(--cyan);}
.day.has-data{border-color:rgba(0,200,236,.22);}
.day.has-ready{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.04);}
.day.has-confirmed{border-color:rgba(0,200,236,.45);background:rgba(0,200,236,.05);}
.dn{font-size:12px;font-weight:600;color:var(--t2);margin-bottom:3px;line-height:1;}
.day.has-data .dn,.day.has-ready .dn,.day.has-confirmed .dn{color:var(--t1);}
.day-tags{display:flex;flex-direction:column;gap:2px;flex:1;}
.dtag{font-size:9.5px;padding:1.5px 4px;border-radius:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5;}
.dtag-j{background:rgba(0,200,236,.12);color:var(--cyan);}
.dtag-p{background:rgba(167,139,250,.14);color:var(--purple);}
.dtag-ready{background:rgba(34,197,94,.15);color:var(--green);}
.dtag-conf{background:rgba(0,200,236,.2);color:var(--cyan);}
.overlay{position:fixed;inset:0;z-index:200;background:rgba(5,14,26,.9);
  backdrop-filter:blur(10px);display:flex;align-items:flex-end;justify-content:center;
  padding:0;opacity:0;pointer-events:none;transition:opacity .22s;}
.overlay.on{opacity:1;pointer-events:all;}
@media(min-width:540px){.overlay{align-items:center;padding:16px;}}
.modal{background:var(--card2);border:1px solid var(--b2);border-radius:20px 20px 0 0;
  padding:20px 18px 32px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;
  transform:translateY(40px);transition:transform .25s cubic-bezier(.34,1.2,.64,1);}
@media(min-width:540px){.modal{border-radius:20px;transform:translateY(14px);}}
.overlay.on .modal{transform:translateY(0);}
.modal-handle{width:36px;height:3px;background:var(--t3);border-radius:2px;margin:0 auto 16px;display:block;}
@media(min-width:540px){.modal-handle{display:none;}}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--cyan);margin-bottom:3px;}
.modal-sub{font-size:12px;color:var(--t2);margin-bottom:16px;}
.fg{margin-bottom:12px;}
.fl{display:block;font-size:11px;font-weight:600;color:var(--t2);margin-bottom:5px;
  text-transform:uppercase;letter-spacing:.07em;}
.fi{width:100%;background:rgba(0,0,0,.35);border:1px solid var(--b);border-radius:10px;
  padding:10px 13px;color:var(--t1);font-family:'DM Sans',sans-serif;font-size:14px;
  outline:none;transition:border-color .18s;}
.fi:focus{border-color:var(--cyan);}
.fi::placeholder{color:var(--t3);}
.fi-hint{font-size:11px;color:var(--t3);margin-top:4px;line-height:1.5;}
.loc-block{margin-bottom:14px;}
.loc-title{font-size:12px;font-weight:600;padding:5px 10px;border-radius:7px;
  margin-bottom:7px;display:inline-flex;align-items:center;gap:5px;}
.lt-j{background:rgba(0,200,236,.1);color:var(--cyan);}
.lt-p{background:rgba(167,139,250,.1);color:var(--purple);}
.slot-checks{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.slot-check{display:flex;align-items:center;gap:7px;padding:8px 10px;
  background:rgba(0,0,0,.25);border:1px solid var(--b);border-radius:8px;
  cursor:pointer;transition:all .15s;user-select:none;}
.slot-check:hover{border-color:var(--b2);}
.slot-check.sel-j{background:rgba(0,200,236,.1);border-color:rgba(0,200,236,.4);}
.slot-check.sel-p{background:rgba(167,139,250,.1);border-color:rgba(167,139,250,.4);}
.chk-box{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--t3);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:10px;}
.slot-check.sel-j .chk-box{background:var(--cyan);border-color:var(--cyan);color:#050e1a;}
.slot-check.sel-p .chk-box{background:var(--purple);border-color:var(--purple);color:#fff;}
.chk-label{font-size:12px;line-height:1.3;}
.chk-time{font-size:10px;color:var(--t3);margin-top:1px;}
.adb-slot{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px;
  padding:10px 12px;border:1px solid var(--b);border-radius:9px;margin-bottom:6px;}
.adb-slot.ready{border-color:rgba(34,197,94,.35);background:rgba(34,197,94,.04);}
.adb-slot.confirmed{border-color:rgba(0,200,236,.35);background:rgba(0,200,236,.04);}
.adb-info{flex:1;min-width:0;}
.adb-slot-name{font-size:12px;font-weight:500;}
.person-row{display:flex;align-items:center;gap:6px;padding:5px 0;
  border-bottom:1px solid rgba(255,255,255,.04);}
.person-row:last-child{border-bottom:none;}
.person-name{font-size:13px;font-weight:500;flex:1;}
.person-contact{font-size:11px;color:var(--t3);}
.person-actions{display:flex;gap:4px;flex-shrink:0;}
.slot-count{font-size:11px;padding:2px 7px;border-radius:20px;font-weight:600;flex-shrink:0;}
.sc-ok{background:rgba(34,197,94,.15);color:var(--green);}
.sc-no{background:rgba(58,95,120,.2);color:var(--t3);}
.sc-conf{background:rgba(0,200,236,.15);color:var(--cyan);}
.conf-pill{font-size:11px;padding:2px 9px;border-radius:20px;
  background:rgba(0,200,236,.12);color:var(--cyan);font-weight:600;}
.admin-badge{background:rgba(245,158,11,.14);border:1px solid rgba(245,158,11,.28);
  color:var(--amber);font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;}
.admin-day-block{background:var(--card2);border:1px solid var(--b);
  border-radius:14px;padding:16px;margin-bottom:12px;}
.adb-date{font-size:15px;font-weight:600;margin-bottom:12px;}
.sec-head{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;
  letter-spacing:.07em;margin-bottom:7px;display:flex;align-items:center;gap:6px;}
.sec-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.slot-row{display:flex;align-items:center;justify-content:space-between;
  padding:7px 10px;background:rgba(0,0,0,.22);border:1px solid var(--b);
  border-radius:8px;margin-bottom:4px;}
.help-step{display:flex;gap:12px;align-items:flex-start;
  padding:12px 0;border-bottom:1px solid var(--b);}
.help-step:last-child{border-bottom:none;}
.help-num{width:26px;height:26px;border-radius:50%;background:var(--cyan);
  color:#050e1a;font-size:12px;font-weight:700;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;}
.help-text{font-size:13px;line-height:1.6;color:var(--t1);}
.help-text b{color:var(--cyan);}
.help-sub{font-size:11px;color:var(--t3);margin-top:3px;}
.notice-modal{background:var(--card2);border:2px solid rgba(245,158,11,.4);
  border-radius:20px;padding:24px 22px;width:100%;max-width:420px;
  transform:translateY(14px);transition:transform .25s cubic-bezier(.34,1.2,.64,1);}
.overlay.on .notice-modal{transform:translateY(0);}
.notice-textarea{width:100%;background:rgba(0,0,0,.35);border:1px solid var(--b);
  border-radius:10px;padding:10px 13px;color:var(--t1);font-family:'DM Sans',sans-serif;
  font-size:14px;outline:none;transition:border-color .18s;resize:vertical;
  min-height:100px;line-height:1.6;}
.notice-textarea:focus{border-color:var(--amber);}
.edit-row{display:flex;gap:6px;margin-bottom:6px;}
.edit-row .fi{font-size:13px;padding:7px 10px;}
#toast{position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(70px);
  background:var(--card2);border:1px solid var(--b);border-radius:12px;
  padding:10px 20px;font-size:14px;z-index:400;white-space:nowrap;
  transition:transform .28s cubic-bezier(.34,1.56,.64,1);pointer-events:none;
  box-shadow:0 8px 30px rgba(0,0,0,.6);}
#toast.show{transform:translateX(-50%) translateY(0);}
#toast.ok{color:var(--green);border-color:rgba(34,197,94,.3);}
#toast.err{color:var(--red);border-color:rgba(239,68,68,.3);}
.setup-wrap{max-width:460px;margin:50px auto;padding:0 14px;}
.setup-logo{font-family:'Bebas Neue',sans-serif;font-size:50px;letter-spacing:5px;
  color:var(--cyan);text-shadow:0 0 36px rgba(0,200,236,.5);text-align:center;}
.setup-tag{text-align:center;font-size:13px;color:var(--t2);font-weight:300;
  letter-spacing:.5px;margin:4px 0 26px;}
.setup-card{background:var(--card2);border:1px solid var(--b);border-radius:20px;padding:26px;}
.tabs{display:flex;border-bottom:1px solid var(--b);margin-bottom:18px;}
.tabn{padding:7px 13px;font-size:13px;cursor:pointer;color:var(--t3);
  border-bottom:2px solid transparent;background:none;border-top:none;
  border-left:none;border-right:none;font-family:'DM Sans',sans-serif;transition:all .18s;}
.tabn.on{color:var(--cyan);border-bottom-color:var(--cyan);}
.step-n{display:inline-flex;align-items:center;justify-content:center;
  width:19px;height:19px;background:var(--cyan);color:#050e1a;
  border-radius:50%;font-size:10px;font-weight:700;margin-right:6px;}
.step-h{font-size:13px;font-weight:600;margin-bottom:5px;}
.step-d{font-size:12px;color:var(--t2);margin-bottom:11px;line-height:1.65;}
.codeblock{background:rgba(0,0,0,.5);border:1px solid var(--b);border-radius:10px;
  padding:11px;font-size:10px;font-family:monospace;color:var(--t2);
  white-space:pre;overflow-x:auto;line-height:1.65;max-height:200px;overflow-y:auto;}
@media(max-width:480px){
  .cal-grid{gap:2px;}.day{min-height:58px;padding:5px 4px;}.dn{font-size:11px;}
  .slot-checks{grid-template-columns:1fr;}.hbtns{gap:4px;}
}
</style>
</head>

/* ══ SQL ═══════════════════════════════════════════════════════ */
const SQL=`-- Drop existing tables
drop table if exists confirmed_lessons;
drop table if exists availability;

-- Availability table
create table availability (
  id          uuid default gen_random_uuid() primary key,
  wish_date   date not null,
  location    text not null,
  time_slot   text not null,
  name        text not null,
  contact     text,
  password    text not null,
  created_at  timestamptz default now(),
  unique(wish_date, location, time_slot, name)
);

-- Confirmed lessons table
create table confirmed_lessons (
  id          uuid default gen_random_uuid() primary key,
  lesson_date date not null,
  location    text not null,
  time_slot   text not null,
  note        text,
  created_at  timestamptz default now(),
  unique(lesson_date, location, time_slot)
);

-- Notice table
create table if not exists notice (
  id         int primary key default 1,
  content    text not null default '',
  active     boolean not null default false,
  updated_at timestamptz default now()
);
insert into notice (id,content,active) values (1,'',false) on conflict do nothing;

-- RLS
alter table availability      enable row level security;
alter table confirmed_lessons enable row level security;
alter table notice            enable row level security;

create policy "r_av"  on availability      for select using (true);
create policy "w_av"  on availability      for insert with check (true);
create policy "d_av"  on availability      for delete using (true);
create policy "u_av"  on availability      for update using (true);
create policy "r_cl"  on confirmed_lessons for select using (true);
create policy "r_no"  on notice            for select using (true);`;

/* ══ UTILS ═════════════════════════════════════════════════════ */
function ls(k,v){if(v!==undefined){localStorage.setItem(k,v);return v;}return localStorage.getItem(k);}
function lsJ(k,v){if(v!==undefined){localStorage.setItem(k,JSON.stringify(v));return v;}try{return JSON.parse(localStorage.getItem(k));}catch{return null;}}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(m,t='ok'){const e=document.getElementById('toast');e.textContent=m;e.className='show '+t;setTimeout(()=>e.className='',2800);}
function dStr(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function todayStr(){return new Date().toISOString().split('T')[0];}
function fmtDate(ds){const d=new Date(ds+'T12:00:00');return`${T.months[d.getMonth()]} ${d.getDate()} (${T.days[d.getDay()]})`;}
function buildMap(){
  const m={};
  monthData.av.forEach(r=>{
    if(!m[r.wish_date])m[r.wish_date]={};
    if(!m[r.wish_date][r.location])m[r.wish_date][r.location]={};
    if(!m[r.wish_date][r.location][r.time_slot])m[r.wish_date][r.location][r.time_slot]=[];
    m[r.wish_date][r.location][r.time_slot].push({id:r.id,name:r.name,contact:r.contact,password:r.password});
  });
  return m;
}
function buildConfMap(){
  const m={};
  monthData.confirmed.forEach(r=>{m[`${r.lesson_date}|${r.location}|${r.time_slot}`]=true;});
  return m;
}

/* ══ SUPABASE ══════════════════════════════════════════════════ */
function initSB(){
  if(!cfg)return;
  sb=supabase.createClient(cfg.url,cfg.anonKey);
  if(admK)sbAdmin=supabase.createClient(cfg.url,admK);
}
async function loadMonth(){
  if(!sb){render();return;}
  const from=dStr(curYear,curMonth,1);
  const to=dStr(curMonth===11?curYear+1:curYear,curMonth===11?0:curMonth+1,1);
  const[r1,r2]=await Promise.all([
    sb.from('availability').select('*').gte('wish_date',from).lt('wish_date',to),
    sb.from('confirmed_lessons').select('*').gte('lesson_date',from).lt('lesson_date',to)
  ]);
  if(r1.error){
    if(r1.error.code==='42P01')toast('⚠ Run SQL in Supabase first!','err');
    else toast('Load failed','err');
    monthData={av:[],confirmed:[]};render();return;
  }
  monthData={av:r1.data||[],confirmed:r2.data||[]};render();
}
async function loadNotice(){
  if(!sb)return;
  const{data}=await sb.from('notice').select('*').eq('id',1).single();
  activeNotice=(data&&data.active&&data.content)?data:null;
  if(activeNotice&&!sessionStorage.getItem('nd_'+activeNotice.updated_at)){
    S.modal='notice';render();
  }
}
async function apiSignup(date,slots,name,contact,pw){
  const rows=slots.map(s=>({wish_date:date,location:s.loc,time_slot:s.slot,name,contact:contact||null,password:pw}));
  const{error}=await sb.from('availability').upsert(rows,{onConflict:'wish_date,location,time_slot,name',ignoreDuplicates:true});
  if(error){toast(T.v_name+': '+error.message,'err');return false;}
  toast(T.t_signup);return true;
}
async function apiDelete(id,enteredPw){
  const row=monthData.av.find(r=>r.id===id);
  if(!row){toast('Not found','err');return false;}
  if(row.password!==enteredPw){toast(T.v_wrongPw,'err');return false;}
  const{error}=await sb.from('availability').delete().eq('id',id);
  if(error){toast('Delete failed','err');return false;}
  toast(T.t_cancel);return true;
}
async function apiAdminDelete(id){
  if(!sbAdmin){toast(T.v_adminKey,'err');return false;}
  const{error}=await sbAdmin.from('availability').delete().eq('id',id);
  if(error){toast('Delete failed','err');return false;}
  toast(T.t_deleted);return true;
}
async function apiAdminEdit(id,name,contact){
  if(!sbAdmin){toast(T.v_adminKey,'err');return false;}
  const{error}=await sbAdmin.from('availability').update({name,contact:contact||null}).eq('id',id);
  if(error){toast('Update failed','err');return false;}
  toast(T.t_saved);return true;
}
async function apiConfirm(date,loc,slot){
  if(!sbAdmin){toast(T.v_adminKey,'err');return;}
  const{error}=await sbAdmin.from('confirmed_lessons')
    .upsert({lesson_date:date,location:loc,time_slot:slot},{onConflict:'lesson_date,location,time_slot',ignoreDuplicates:true});
  if(error){toast('Confirm failed','err');return;}
  toast(T.t_conf);await loadMonth();
}
async function apiUnconfirm(date,loc,slot){
  if(!sbAdmin){toast(T.v_adminKey,'err');return;}
  await sbAdmin.from('confirmed_lessons').delete().eq('lesson_date',date).eq('location',loc).eq('time_slot',slot);
  toast(T.t_unconf);await loadMonth();
}
async function apiSetNotice(content,active){
  if(!sbAdmin){toast(T.v_adminKey,'err');return false;}
  const{error}=await sbAdmin.from('notice').upsert({id:1,content,active,updated_at:new Date().toISOString()});
  if(error){toast('Notice save failed','err');return false;}
  toast(active?T.t_noticeSaved:T.t_noticeOff);await loadNotice();return true;
}

function rCalendar(){
  const avMap=buildMap(), confMap=buildConfMap();
  const today=todayStr();
  const firstDow=new Date(curYear,curMonth,1).getDay();
  const daysInMonth=new Date(curYear,curMonth+1,0).getDate();
  let cells='';
  T.days.forEach(d=>{cells+=`<div class="dow">${d}</div>`;});
  for(let i=0;i<firstDow;i++)cells+=`<div class="day empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=dStr(curYear,curMonth,d);
    const dayAv=avMap[ds]||{};
    let hasData=false,hasReady=false,hasConf=false;
    let tags='<div class="day-tags">';
    for(const[locKey,loc]of Object.entries(LOC)){
      const locAv=dayAv[locKey]||{};
      const slots=Object.keys(locAv);
      if(!slots.length)continue;
      hasData=true;
      let maxCnt=0,anyConf=false;
      slots.forEach(sl=>{
        const cnt=locAv[sl].length;
        if(cnt>maxCnt)maxCnt=cnt;
        if(confMap[`${ds}|${locKey}|${sl}`])anyConf=true;
      });
      if(anyConf)hasConf=true;
      if(maxCnt>=2)hasReady=true;
      const uniq=new Set(slots.flatMap(sl=>locAv[sl].map(x=>x.name))).size;
      let tc=loc.tagCls;
      if(anyConf)tc='dtag-conf';else if(maxCnt>=2)tc='dtag-ready';
      tags+=`<div class="dtag ${tc}">${loc.short} ${uniq}</div>`;
    }
    tags+='</div>';
    let cls='day';
    if(hasConf)cls+=' has-confirmed';else if(hasReady)cls+=' has-ready';else if(hasData)cls+=' has-data';
    if(ds===today)cls+=' today';
    if(ds<today)cls+=' past';
    cells+=`<div class="${cls}" data-date="${ds}"><div class="dn">${d}</div>${tags}</div>`;
  }
  return`
${rHeader(S.view==='admin')}
<main>
  <div class="cal-nav">
    <button class="nav-btn" id="btn-prev">‹</button>
    <div class="cal-title">${curYear} · ${T.months[curMonth]}</div>
    <button class="nav-btn" id="btn-next">›</button>
  </div>
  <div style="display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px">
    <div class="legend">
      <div class="leg"><div class="leg-dot" style="background:var(--t3)"></div>${T.hasSignups}</div>
      <div class="leg"><div class="leg-dot" style="background:var(--green)"></div>${T.twoPlus}</div>
      <div class="leg"><div class="leg-dot" style="background:var(--cyan)"></div>${T.confirmed}</div>
    </div>
  </div>
  <div class="cal-grid">${cells}</div>
</main>
${rModal()}`;}

    const hasAny=Object.values(dayAv).some(l=>Object.values(l).some(s=>s.length>0));
    return`<div class="overlay on" id="ov"><div class="modal">

      <div class="modal-title">${fmtDate(ds)}</div>
      <div class="modal-sub">${T.detailSub}<br><small style="color:var(--t3)">${T.cancelHint}</small></div>
      ${hasAny?sections:`<div style="text-align:center;padding:20px;color:var(--t3);font-size:13px">${T.noOne}</div>`}
      <button class="btn btn-primary btn-wide" id="btn-go-signup" style="margin-bottom:8px">${T.signUpBtn}</button>
      <button class="btn btn-ghost btn-wide" id="btn-mc">${T.close}</button>
    </div></div>`;}

  /* ── Signup form ── */
  if(S.modal==='signup'&&S.selDate){
    const ds=S.selDate;
    let locBlocks='';
    for(const[locKey,loc]of Object.entries(LOC)){
      const checks=loc.slots(ds).map(sl=>`
        <label class="slot-check" data-loc="${locKey}" data-slot="${sl.id}">
          <div class="chk-box">✓</div>
          <div><div class="chk-label">${sl.id}</div><div class="chk-time">${sl.time}</div></div>
        </label>`).join('');
      locBlocks+=`<div class="loc-block">
        <div class="loc-title ${loc.cls}">${loc.name}</div>
        <div class="slot-checks">${checks}</div></div>`;
    }
    return`<div class="overlay on" id="ov"><div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">${T.signupTitle}</div>
      <div class="modal-sub">${fmtDate(ds)} · ${T.selectAll}</div>
      ${locBlocks}
      <div style="height:1px;background:var(--b);margin:12px 0"></div>
      <div class="fg"><label class="fl">${T.nameLbl} <span style="color:var(--red)">*</span></label>
        <input class="fi" id="s-name" placeholder="${T.namePh}"/></div>
      <div class="fg"><label class="fl">${T.contactLbl}</label>
        <input class="fi" id="s-contact" placeholder="${T.contactPh}"/></div>
      <div class="fg"><label class="fl">${T.pwLbl} <span style="color:var(--red)">*</span></label>
        <input class="fi" id="s-pw" type="password" placeholder="${T.pwPh}"/>
        <div class="fi-hint">${T.pwHint}</div></div>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="btn btn-ghost" style="flex:1;justify-content:center" id="btn-back">${T.back}</button>
        <button class="btn btn-primary" style="flex:2;justify-content:center" id="btn-submit">${T.submit}</button>
      </div>
    </div></div>`;}

  /* ── Delete (user) ── */
  if(S.modal==='del'&&S.selAv){
    return`<div class="overlay on" id="ov"><div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">${T.delTitle}</div>
      <div class="modal-sub">${esc(S.selAv.name)}</div>
      <div class="fg"><label class="fl">${T.pwConfirmLbl}</label>
        <input class="fi" id="del-pw" type="password" placeholder="${T.pwDelPh}"/></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost" style="flex:1;justify-content:center" id="btn-mc">${T.cancel}</button>
        <button class="btn btn-danger" style="flex:2;justify-content:center" id="btn-del-ok">${T.delOk}</button>
      </div>
    </div></div>`;}

  /* ── Admin edit ── */
  if(S.modal==='admin-edit'&&S.editId){
    const row=monthData.av.find(r=>r.id===S.editId);
    if(!row)return'';
    return`<div class="overlay on" id="ov"><div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">${T.adminEditTitle}</div>
      <div class="modal-sub" style="margin-bottom:16px">${fmtDate(row.wish_date)}</div>
      <div class="fg"><label class="fl">${T.nameLbl}</label>
        <input class="fi" id="edit-name" value="${esc(row.name)}" placeholder="${T.namePh}"/></div>
      <div class="fg"><label class="fl">${T.contactLbl}</label>
        <input class="fi" id="edit-contact" value="${esc(row.contact||'')}" placeholder="${T.contactPh}"/></div>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="btn btn-ghost" style="flex:1;justify-content:center" id="btn-mc">${T.cancel}</button>
        <button class="btn btn-primary" style="flex:2;justify-content:center" id="btn-edit-save">${T.saveBtn}</button>
      </div>
    </div></div>`;}

  /* ── Admin all signups ── */
  if(S.modal==='admin-all'){
    const avMap=buildMap(), confMap=buildConfMap();
    const today=todayStr();
    const dates=Object.keys(avMap).filter(d=>d>=today).sort();
    let content='';
    dates.forEach(ds=>{
      const dayAv=avMap[ds];
      let slotRows='',hasReady=false;
      for(const[locKey,loc]of Object.entries(LOC)){
        const locAv=dayAv[locKey]||{};
        loc.slots(ds).forEach(sl=>{
          const people=locAv[sl.id]||[];
          if(!people.length)return;
          const isConf=confMap[`${ds}|${locKey}|${sl.id}`];
          const ready=people.length>=2;
          if(ready&&!isConf)hasReady=true;
          let rowCls='adb-slot';
          if(isConf)rowCls+=' confirmed';else if(ready)rowCls+=' ready';
          const adminBtns=isConf
            ?`<button class="btn btn-ghost btn-sm" data-unconf="${ds}" data-loc="${locKey}" data-slot="${sl.id}">${T.unconfBtn}</button>`
            :ready?`<button class="btn btn-success btn-sm" data-conf="${ds}" data-loc="${locKey}" data-slot="${sl.id}">${T.confBtn}</button>`:'';
          const personRows=people.map(p=>`
            <div class="person-row">
              <div>
                <div class="person-name">${esc(p.name)}</div>
                ${p.contact?`<div class="person-contact">${esc(p.contact)}</div>`:''}
              </div>
              <div class="person-actions">
                <button class="btn btn-warn btn-sm" data-edit-id="${p.id}">✏ ${T.editBtn}</button>
                <button class="btn btn-danger btn-sm" data-adm-del="${p.id}" data-adm-name="${esc(p.name)}">✕ ${T.delBtn}</button>
              </div>
            </div>`).join('');
          slotRows+=`<div class="${rowCls}" style="flex-direction:column;align-items:stretch;gap:6px">
            <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px">
              <div class="adb-slot-name">${loc.short} ${sl.id} <span style="color:var(--t2);font-size:11px">${sl.time}</span></div>
              <div style="display:flex;align-items:center;gap:6px">
                ${isConf?`<span class="conf-pill">${T.confLabel}</span>`:ready?`<span class="slot-count sc-ok">${people.length}</span>`:`<span class="slot-count sc-no">${people.length}</span>`}
                ${adminBtns}
              </div>
            </div>
            <div style="background:rgba(0,0,0,.2);border-radius:8px;padding:4px 8px">${personRows}</div>
          </div>`;
        });
      }
      if(!slotRows)return;
      content+=`<div class="admin-day-block">
        <div class="adb-date">${fmtDate(ds)}${hasReady?` <span style="font-size:11px;color:var(--green)">${T.canOpen}</span>`:''}</div>
        ${slotRows}
      </div>`;
    });
    return`<div class="overlay on" id="ov"><div class="modal" style="max-width:540px">
      <div class="modal-handle"></div>
      <div class="modal-title">${T.adminAllTitle}</div>
      <div class="modal-sub" style="margin-bottom:16px">${T.adminAllSub(monthData.av.length)}</div>
      ${content||`<div style="text-align:center;padding:20px;color:var(--t3)">${T.thisMonthNo}</div>`}
      <button class="btn btn-ghost btn-wide" style="margin-top:8px" id="btn-mc">${T.close}</button>
    </div></div>`;}

  /* ── Admin notice editor ── */
  if(S.modal==='admin-notice'){
    const cur=activeNotice||{content:'',active:false};
    return`<div class="overlay on" id="ov"><div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">${T.noticeMgrTitle}</div>
      <div class="modal-sub">${T.noticeMgrSub}</div>
      <div class="fg"><label class="fl">${T.noticeTextLbl}</label>
        <textarea class="notice-textarea" id="notice-text"
          placeholder="공지 내용 / Notice content">${esc(cur.content)}</textarea></div>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="btn btn-ghost" style="flex:1;justify-content:center" id="btn-mc">${T.cancel}</button>
        <button class="btn btn-danger btn-sm" style="flex:1;justify-content:center" id="btn-notice-off">${T.noticeOffBtn}</button>
        <button class="btn btn-primary" style="flex:2;justify-content:center" id="btn-notice-save">${T.noticeSaveBtn}</button>
      </div>
    </div></div>`;}

  return'';}

function render(){
  document.getElementById('app').innerHTML=cfg?rCalendar():rSetup();
  bind();
}

/* ══ EVENTS ════════════════════════════════════════════════════ */
function bind(){
  const $=id=>document.getElementById(id);
  const on=(id,ev,fn)=>{const el=$(id);if(el)el.addEventListener(ev,fn);};
  const val=id=>{const el=$(id);return el?el.value.trim():'';};
  const close=()=>{S.modal=null;S.selAv=null;S.editId=null;render();};

  /* lang */
  on('btn-lang','click',()=>{
    curLang=curLang==='ko'?'en':'ko';
    T=TRANS[curLang];ls('fd_lang',curLang);
    render();
  });

  /* tabs */
  document.querySelectorAll('.tabn').forEach(t=>t.addEventListener('click',()=>{
    document.querySelectorAll('.tabn').forEach(x=>x.classList.remove('on'));t.classList.add('on');
    const w=t.dataset.tab;
    const cc=$('tp-conn'),cs=$('tp-sql');
    if(cc)cc.style.display=w==='conn'?'':'none';
    if(cs)cs.style.display=w==='sql'?'':'none';
  }));

  /* setup */
  on('btn-conn','click',()=>{
    const url=val('inp-url'),anon=val('inp-anon'),svc=val('inp-svc');
    if(!url||!anon){toast(T.v_name,'err');return;}
    cfg={url,anonKey:anon};lsJ('fd_cfg',cfg);
    if(svc){admK=svc;ls('fd_adm',svc);}
    initSB();loadMonth();loadNotice();
  });
  on('btn-copy-sql','click',()=>navigator.clipboard.writeText(SQL).then(()=>toast('SQL copied!')));

  /* header */
  on('btn-help','click',()=>{S.modal='help';render();});
  on('btn-admin','click',()=>{
    const k=prompt(T.adminPrompt);
    if(!k)return;admK=k;ls('fd_adm',k);
    sbAdmin=supabase.createClient(cfg.url,k);
    S.view='admin';render();
  });
  on('btn-exit','click',()=>{S.view='main';S.modal=null;render();});
  on('btn-reset','click',()=>{
    if(!confirm(T.resetConfirm))return;
    ['fd_cfg','fd_adm'].forEach(k=>localStorage.removeItem(k));
    cfg=null;admK='';sb=null;sbAdmin=null;render();
  });
  on('btn-view-all','click',()=>{S.modal='admin-all';render();});
  on('btn-notice-mgr','click',()=>{S.modal='admin-notice';render();});

  /* nav */
  on('btn-prev','click',()=>{if(curMonth===0){curMonth=11;curYear--;}else curMonth--;loadMonth();});
  on('btn-next','click',()=>{if(curMonth===11){curMonth=0;curYear++;}else curMonth++;loadMonth();});

  /* day click */
  document.querySelectorAll('.day:not(.empty)').forEach(cell=>{
    cell.addEventListener('click',()=>{S.selDate=cell.dataset.date;S.modal='detail';render();});
  });

  /* detail */
  on('btn-go-signup','click',()=>{S.modal='signup';render();});
  on('btn-mc','click',close);
  on('btn-back','click',()=>{S.modal='detail';render();});

  /* user delete */
  document.querySelectorAll('[data-del-id]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      S.selAv={id:el.dataset.delId,name:el.dataset.delName};
      S.modal='del';render();
    });
  });

  /* slot checkboxes */
  document.querySelectorAll('.slot-check').forEach(el=>{
    el.addEventListener('click',()=>{
      const loc=LOC[el.dataset.loc];el.classList.toggle(loc.selCls);
    });
  });

  /* signup submit */
  on('btn-submit','click',async()=>{
    const name=val('s-name'),pw=val('s-pw');
    if(!name){toast(T.v_name,'err');return;}
    if(!pw){toast(T.v_pw,'err');return;}
    const selected=[];
    document.querySelectorAll('.slot-check').forEach(el=>{
      if(el.classList.contains(LOC[el.dataset.loc].selCls))
        selected.push({loc:el.dataset.loc,slot:el.dataset.slot});
    });
    if(!selected.length){toast(T.v_slot,'err');return;}
    const btn=$('btn-submit');if(btn)btn.disabled=true;
    const ok=await apiSignup(S.selDate,selected,name,val('s-contact'),pw);
    if(btn)btn.disabled=false;
    if(ok){S.modal='detail';await loadMonth();}
  });

  /* user delete confirm */
  on('btn-del-ok','click',async()=>{
    const btn=$('btn-del-ok');if(btn)btn.disabled=true;
    const ok=await apiDelete(S.selAv.id,val('del-pw'));
    if(btn)btn.disabled=false;
    if(ok){S.modal='detail';await loadMonth();}
  });
  on('del-pw','keydown',e=>{if(e.key==='Enter')$('btn-del-ok')?.click();});
  on('s-pw','keydown',e=>{if(e.key==='Enter')$('btn-submit')?.click();});

  /* admin: confirm / unconfirm */
  document.querySelectorAll('[data-conf]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      btn.disabled=true;
      await apiConfirm(btn.dataset.conf,btn.dataset.loc,btn.dataset.slot);
      btn.disabled=false;
    });
  });
  document.querySelectorAll('[data-unconf]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      btn.disabled=true;
      await apiUnconfirm(btn.dataset.unconf,btn.dataset.loc,btn.dataset.slot);
      btn.disabled=false;
    });
  });

  /* admin: edit signup */
  document.querySelectorAll('[data-edit-id]').forEach(btn=>{
    btn.addEventListener('click',()=>{S.editId=btn.dataset.editId;S.modal='admin-edit';render();});
  });
  on('btn-edit-save','click',async()=>{
    const name=val('edit-name');
    if(!name){toast(T.v_name,'err');return;}
    const btn=$('btn-edit-save');if(btn)btn.disabled=true;
    const ok=await apiAdminEdit(S.editId,name,val('edit-contact'));
    if(btn)btn.disabled=false;
    if(ok){S.editId=null;S.modal='admin-all';await loadMonth();}
  });

  /* admin: delete signup */
  document.querySelectorAll('[data-adm-del]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      if(!confirm(`${T.adminDelConfirm}\n"${btn.dataset.admName}"`))return;
      btn.disabled=true;
      const ok=await apiAdminDelete(btn.dataset.admDel);
      btn.disabled=false;
      if(ok){S.modal='admin-all';await loadMonth();}
    });
  });

  /* notice */
  on('btn-notice-ok','click',()=>{
    if(activeNotice)sessionStorage.setItem('nd_'+activeNotice.updated_at,'1');
    S.modal=null;render();
  });
  on('btn-notice-save','click',async()=>{
    const txt=document.getElementById('notice-text')?.value?.trim()||'';
    if(!txt){toast(T.v_notice,'err');return;}
    const btn=$('btn-notice-save');if(btn)btn.disabled=true;
    await apiSetNotice(txt,true);
    if(btn)btn.disabled=false;
    S.modal=null;render();
  });
  on('btn-notice-off','click',async()=>{
    await apiSetNotice('',false);S.modal=null;render();
  });

  /* overlay backdrop */
  const ov=$('ov');
  if(ov)ov.addEventListener('click',e=>{if(e.target===ov)close();});
}

/* ══ INIT ══════════════════════════════════════════════════════ */
initSB();render();
if(cfg){loadMonth();loadNotice();}
</script>
</body>
</html>
