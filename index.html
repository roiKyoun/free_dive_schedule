<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FreeDive — 강습 스케줄</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    :root {
      --bg0: #050e1a;
      --bg1: #091626;
      --bg2: #0e2040;
      --card: #112248;
      --cyan: #00c8ec;
      --teal: #14b8a6;
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
      --txt1: #e4f2f8;
      --txt2: #6da8c4;
      --txt3: #3a5f78;
      --bdr: rgba(0,200,236,0.1);
      --bdr2: rgba(0,200,236,0.28);
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body {
      background:var(--bg0);
      color:var(--txt1);
      font-family:'DM Sans',sans-serif;
      min-height:100vh;
      overflow-x:hidden;
    }
    body::after {
      content:'';
      position:fixed; inset:0; pointer-events:none; z-index:0;
      background:
        radial-gradient(ellipse 60% 50% at 10% 15%, rgba(0,200,236,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 90% 85%, rgba(20,184,166,0.05) 0%, transparent 70%);
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      position:sticky; top:0; z-index:50;
      background:rgba(5,14,26,0.9);
      backdrop-filter:blur(18px);
      border-bottom:1px solid var(--bdr);
      padding:14px 24px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .logo {
      font-family:'Bebas Neue',sans-serif;
      font-size:24px; letter-spacing:3px;
      color:var(--cyan);
      text-shadow:0 0 20px rgba(0,200,236,0.5);
      line-height:1;
    }
    .logo small {
      display:block;
      font-family:'DM Sans',sans-serif;
      font-size:10px; font-weight:300;
      letter-spacing:2px; color:var(--txt3);
      margin-top:1px; text-transform:uppercase;
    }
    .header-actions { display:flex; gap:8px; align-items:center; }

    /* ── Buttons ─────────────────────────────────────────────── */
    .btn {
      display:inline-flex; align-items:center; gap:5px;
      padding:8px 16px; border-radius:9px; border:none;
      cursor:pointer; font-family:'DM Sans',sans-serif;
      font-size:13px; font-weight:500; transition:all .18s;
    }
    .btn-primary { background:var(--cyan); color:#050e1a; }
    .btn-primary:hover { filter:brightness(1.1); transform:translateY(-1px); box-shadow:0 4px 16px rgba(0,200,236,0.35); }
    .btn-ghost { background:transparent; color:var(--txt2); border:1px solid var(--bdr); }
    .btn-ghost:hover { border-color:var(--bdr2); color:var(--txt1); }
    .btn-success { background:var(--green); color:#fff; }
    .btn-success:hover { filter:brightness(1.08); }
    .btn-danger { background:transparent; color:var(--red); border:1px solid rgba(239,68,68,.25); }
    .btn-danger:hover { background:rgba(239,68,68,.1); }
    .btn-sm { padding:5px 12px; font-size:12px; }
    .btn-wide { width:100%; justify-content:center; }
    .btn:disabled { opacity:.4; cursor:not-allowed; transform:none !important; filter:none !important; }

    /* ── Main layout ─────────────────────────────────────────── */
    main { position:relative; z-index:1; max-width:980px; margin:0 auto; padding:36px 20px 60px; }
    .page-title { font-family:'Bebas Neue',sans-serif; font-size:38px; letter-spacing:2px; margin-bottom:4px; }
    .page-sub { font-size:14px; color:var(--txt2); font-weight:300; margin-bottom:24px; line-height:1.6; }

    /* ── Legend ─────────────────────────────────────────────── */
    .legend { display:flex; gap:18px; flex-wrap:wrap; margin-bottom:28px; }
    .legend-item { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--txt2); }
    .legend-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

    /* ── Slots grid ──────────────────────────────────────────── */
    .slots-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(275px,1fr)); gap:16px; }

    /* ── Slot card ───────────────────────────────────────────── */
    .slot-card {
      background:var(--card);
      border:1px solid var(--bdr);
      border-radius:18px; padding:20px;
      transition:all .22s; position:relative; overflow:hidden;
    }
    .slot-card::before {
      content:''; position:absolute;
      top:0; left:0; right:0; height:3px;
      background:var(--txt3); transition:background .22s;
    }
    .slot-card.ready::before { background:var(--green); }
    .slot-card.confirmed::before { background:var(--cyan); }
    .slot-card:hover { border-color:var(--bdr2); transform:translateY(-3px); box-shadow:0 10px 36px rgba(0,0,0,.45); }

    .card-status {
      display:inline-flex; align-items:center; gap:5px;
      font-size:11px; font-weight:600; padding:3px 9px;
      border-radius:20px; margin-bottom:14px;
    }
    .cs-open    { background:rgba(58,95,120,.25); color:var(--txt3); }
    .cs-ready   { background:rgba(34,197,94,.14); color:var(--green); }
    .cs-confirmed { background:rgba(0,200,236,.14); color:var(--cyan); }

    .card-date-row { display:flex; align-items:flex-end; gap:8px; margin-bottom:12px; }
    .day-num { font-family:'Bebas Neue',sans-serif; font-size:46px; line-height:1; color:var(--cyan); }
    .day-info { display:flex; flex-direction:column; padding-bottom:4px; }
    .day-month { font-size:11px; color:var(--txt2); text-transform:uppercase; letter-spacing:.08em; }
    .day-dow   { font-size:12px; color:var(--txt3); }

    .card-type { font-size:16px; font-weight:600; margin-bottom:6px; }
    .card-meta { font-size:12px; color:var(--txt2); display:flex; flex-wrap:wrap; gap:10px; margin-bottom:14px; }
    .meta-item { display:flex; align-items:center; gap:3px; }

    .ptcpt-section { margin-bottom:14px; }
    .ptcpt-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
    .ptcpt-label { font-size:10px; font-weight:600; color:var(--txt3); text-transform:uppercase; letter-spacing:.08em; }
    .count-pill {
      font-size:11px; font-weight:600; padding:2px 8px; border-radius:20px;
    }
    .cp-none  { background:rgba(58,95,120,.2); color:var(--txt3); }
    .cp-ready { background:rgba(34,197,94,.14); color:var(--green); }
    .cp-full  { background:rgba(0,200,236,.14); color:var(--cyan); }

    .ptcpt-tags { display:flex; flex-wrap:wrap; gap:5px; }
    .ptag {
      font-size:11px; padding:3px 9px;
      background:rgba(0,200,236,.07);
      border:1px solid rgba(0,200,236,.12);
      border-radius:20px; color:var(--txt2);
    }
    .ptag.mine { border-color:rgba(0,200,236,.4); color:var(--cyan); }
    .ptag-empty { font-size:12px; color:var(--txt3); font-style:italic; }

    .card-foot { display:flex; justify-content:flex-end; margin-top:4px; }

    /* ── Modal ───────────────────────────────────────────────── */
    .overlay {
      position:fixed; inset:0; z-index:200;
      background:rgba(5,14,26,.88);
      backdrop-filter:blur(10px);
      display:flex; align-items:center; justify-content:center;
      padding:20px; opacity:0; pointer-events:none;
      transition:opacity .2s;
    }
    .overlay.on { opacity:1; pointer-events:all; }
    .modal {
      background:var(--card);
      border:1px solid var(--bdr2);
      border-radius:20px; padding:28px;
      width:100%; max-width:440px;
      transform:translateY(14px); transition:transform .2s;
    }
    .overlay.on .modal { transform:translateY(0); }
    .modal-title {
      font-family:'Bebas Neue',sans-serif;
      font-size:22px; letter-spacing:2px;
      color:var(--cyan); margin-bottom:4px;
    }
    .modal-sub { font-size:13px; color:var(--txt2); margin-bottom:22px; }
    .modal-divider { border:none; border-top:1px solid var(--bdr); margin:18px 0; }

    /* ── Form ────────────────────────────────────────────────── */
    .fg { margin-bottom:15px; }
    .fl {
      display:block; font-size:11px; font-weight:600;
      color:var(--txt2); margin-bottom:5px;
      text-transform:uppercase; letter-spacing:.07em;
    }
    .fi {
      width:100%; background:rgba(0,0,0,.35);
      border:1px solid var(--bdr); border-radius:10px;
      padding:10px 13px; color:var(--txt1);
      font-family:'DM Sans',sans-serif; font-size:14px;
      outline:none; transition:border-color .18s;
    }
    .fi:focus { border-color:var(--cyan); }
    .fi::placeholder { color:var(--txt3); }
    input[type=date].fi,
    input[type=time].fi { color-scheme:dark; }
    .frow { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .modal-btns { display:flex; gap:8px; margin-top:6px; }

    /* ── Code block ──────────────────────────────────────────── */
    .codeblock {
      background:rgba(0,0,0,.5); border:1px solid var(--bdr);
      border-radius:10px; padding:14px;
      font-size:11px; font-family:monospace; color:var(--txt2);
      white-space:pre; overflow-x:auto; line-height:1.65;
      max-height:240px; overflow-y:auto;
    }

    /* ── Toast ───────────────────────────────────────────────── */
    #toast {
      position:fixed; bottom:24px; left:50%;
      transform:translateX(-50%) translateY(70px);
      background:var(--card); border:1px solid var(--bdr);
      border-radius:12px; padding:11px 22px;
      font-size:14px; z-index:400;
      transition:transform .28s cubic-bezier(.34,1.56,.64,1);
      white-space:nowrap; pointer-events:none;
      box-shadow:0 8px 30px rgba(0,0,0,.6);
    }
    #toast.show { transform:translateX(-50%) translateY(0); }
    #toast.ok  { color:var(--green); border-color:rgba(34,197,94,.3); }
    #toast.err { color:var(--red);   border-color:rgba(239,68,68,.3); }

    /* ── Setup page ──────────────────────────────────────────── */
    .setup-wrap { max-width:500px; margin:60px auto; padding:0 20px; }
    .setup-head { text-align:center; margin-bottom:28px; }
    .setup-biglogo {
      font-family:'Bebas Neue',sans-serif;
      font-size:52px; letter-spacing:5px;
      color:var(--cyan); text-shadow:0 0 36px rgba(0,200,236,.5);
    }
    .setup-tagline { font-size:13px; color:var(--txt2); font-weight:300; letter-spacing:.5px; margin-top:4px; }
    .setup-card { background:var(--card); border:1px solid var(--bdr); border-radius:20px; padding:30px; }

    /* tabs */
    .tabs { display:flex; border-bottom:1px solid var(--bdr); margin-bottom:22px; }
    .tabn {
      padding:8px 16px; font-size:13px; cursor:pointer;
      color:var(--txt3); border-bottom:2px solid transparent;
      background:none; border-top:none; border-left:none; border-right:none;
      font-family:'DM Sans',sans-serif; transition:all .18s;
    }
    .tabn.on { color:var(--cyan); border-bottom-color:var(--cyan); }
    .tabn:hover { color:var(--txt2); }

    .step-num {
      display:inline-flex; align-items:center; justify-content:center;
      width:20px; height:20px; background:var(--cyan); color:#050e1a;
      border-radius:50%; font-size:10px; font-weight:700; margin-right:7px;
    }
    .step-head { font-size:13px; font-weight:600; margin-bottom:6px; color:var(--txt1); }
    .step-desc { font-size:12px; color:var(--txt2); margin-bottom:13px; line-height:1.65; }

    /* ── Admin page ──────────────────────────────────────────── */
    .admin-badge {
      background:rgba(245,158,11,.14); border:1px solid rgba(245,158,11,.28);
      color:var(--amber); font-size:11px; font-weight:600;
      padding:3px 9px; border-radius:20px;
    }
    .stats-row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:28px; }
    .stat-card {
      background:var(--card); border:1px solid var(--bdr);
      border-radius:13px; padding:14px 18px; flex:1; min-width:100px;
    }
    .stat-val { font-size:26px; font-weight:600; }
    .stat-lbl { font-size:11px; color:var(--txt3); margin-top:2px; }

    .admin-slot {
      background:var(--card); border:1px solid var(--bdr);
      border-radius:14px; padding:18px; margin-bottom:12px;
    }
    .asl-head { display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-bottom:12px; }
    .asl-title { font-size:15px; font-weight:600; }
    .asl-meta  { font-size:12px; color:var(--txt2); margin-top:2px; }
    .asl-actions { display:flex; gap:7px; flex-shrink:0; }
    .asl-ptcpt-list { display:flex; flex-wrap:wrap; gap:6px; }
    .ap-tag {
      background:rgba(0,200,236,.06); border:1px solid var(--bdr);
      border-radius:8px; padding:4px 10px;
      font-size:12px; color:var(--txt2);
    }
    .ap-contact { color:var(--txt3); font-size:11px; margin-left:4px; }

    /* ── Loading / Empty ─────────────────────────────────────── */
    .loading { display:flex; align-items:center; justify-content:center; gap:10px; padding:70px; color:var(--txt3); font-size:14px; }
    .spin { width:20px; height:20px; border:2px solid var(--bdr); border-top-color:var(--cyan); border-radius:50%; animation:rot .8s linear infinite; }
    @keyframes rot { to { transform:rotate(360deg); } }
    .empty { text-align:center; padding:70px 20px; color:var(--txt3); }
    .empty-icon { font-size:42px; margin-bottom:12px; }
    .empty-ttl { font-size:16px; color:var(--txt2); margin-bottom:6px; }
    .empty-dsc { font-size:13px; font-weight:300; }

    @media (max-width:540px) {
      .frow { grid-template-columns:1fr; }
      .asl-head { flex-direction:column; }
      .legend { gap:12px; }
    }
  </style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>

<script>
/* ───────────────────────────────────────────────────────────────
   CONFIG — 직접 여기에 넣어도 됩니다 (GitHub Pages 배포용)
   비워두면 앱이 설정 화면을 띄워줘요
────────────────────────────────────────────────────────────────── */
const HARDCODED = {
  url:     '',   // 예: 'https://abcxyz.supabase.co'
  anonKey: '',   // Settings > API > anon public
};

/* ───────────────────────────────────────────────────────────────
   SQL — Supabase SQL Editor에 복붙해서 실행하세요
────────────────────────────────────────────────────────────────── */
const SQL = `-- ① 강습 시간대 테이블
create table if not exists time_slots (
  id              uuid default gen_random_uuid() primary key,
  date            date        not null,
  start_time      time        not null,
  end_time        time        not null,
  location        text        default '풀장',
  lesson_type     text        default '기초 강습',
  max_participants int         default 6,
  status          text        default 'open',
  notes           text,
  created_at      timestamptz default now()
);

-- ② 참여 가능 표시 테이블
create table if not exists availability (
  id         uuid default gen_random_uuid() primary key,
  slot_id    uuid references time_slots(id) on delete cascade,
  name       text not null,
  contact    text,
  user_token text not null,
  created_at timestamptz default now(),
  unique(slot_id, user_token)
);

-- ③ RLS 보안 설정
alter table time_slots  enable row level security;
alter table availability enable row level security;

create policy "읽기 허용 - slots"        on time_slots  for select using (true);
create policy "읽기 허용 - availability" on availability for select using (true);
create policy "참여 등록 허용"            on availability for insert with check (true);
create policy "참여 취소 허용"            on availability for delete using (true);`;

/* ═══════════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════════ */
let sb = null, sbAdmin = null;
let userToken = ls('fd_tok') || uid();
let cfg  = HARDCODED.url ? HARDCODED : (lsJ('fd_cfg') || null);
let admK = ls('fd_adm') || '';
let S = {
  view:        'main',   // 'setup' | 'main' | 'admin'
  slots:       [],
  loading:     true,
  modal:       null,     // 'join' | 'addslot' | 'sql'
  selSlot:     null,
};
ls('fd_tok', userToken);

/* ═══════════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════════ */
function uid(){ return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16);}); }
function ls(k,v){ if(v!==undefined){ localStorage.setItem(k,v); return v; } return localStorage.getItem(k); }
function lsJ(k,v){ if(v!==undefined){ localStorage.setItem(k,JSON.stringify(v)); return v; } try{ return JSON.parse(localStorage.getItem(k)); }catch{ return null; } }
function esc(s){ if(!s)return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(t){ return t?t.slice(0,5):''; }
function fmtDate(ds){
  const d=new Date(ds+'T12:00:00');
  const dow=['일','월','화','수','목','금','토'];
  return {
    day:d.getDate(), month:(d.getMonth()+1)+'월',
    dow:dow[d.getDay()]+'요일',
    full:`${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`
  };
}
function toast(msg, type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=`show ${type}`;
  setTimeout(()=>el.className='',2600);
}

/* ═══════════════════════════════════════════════════════════════
   SUPABASE API
═══════════════════════════════════════════════════════════════ */
function initSB(){
  if(!cfg) return;
  sb=supabase.createClient(cfg.url, cfg.anonKey);
  if(admK) sbAdmin=supabase.createClient(cfg.url, admK);
}

async function loadSlots(){
  if(!sb){ S.loading=false; render(); return; }
  S.loading=true; render();
  const today=new Date().toISOString().split('T')[0];
  const {data,error}=await sb
    .from('time_slots')
    .select('*, availability(id,name,contact,user_token)')
    .gte('date',today)
    .order('date').order('start_time');
  if(error){ toast('로드 실패: '+error.message,'err'); S.loading=false; render(); return; }
  S.slots=data||[]; S.loading=false; render();
}

async function apiJoin(slotId, name, contact){
  const {error}=await sb.from('availability').insert({slot_id:slotId,name,contact:contact||null,user_token:userToken});
  if(error){
    if(error.code==='23505') toast('이미 참여 의사를 표시했어요 😊','err');
    else toast('저장 실패: '+error.message,'err');
    return false;
  }
  toast('참여 의사가 등록되었어요! 🤿');
  return true;
}

async function apiLeave(slotId){
  const {error}=await sb.from('availability').delete().eq('slot_id',slotId).eq('user_token',userToken);
  if(error){ toast('취소 실패','err'); return false; }
  toast('참여 취소했어요'); return true;
}

async function apiConfirm(slotId){
  if(!sbAdmin){ toast('관리자 키 필요','err'); return; }
  const {error}=await sbAdmin.from('time_slots').update({status:'confirmed'}).eq('id',slotId);
  if(error){ toast('확정 실패: '+error.message,'err'); return; }
  toast('강습이 확정되었어요 ✓'); loadSlots();
}

async function apiDelete(slotId){
  if(!sbAdmin){ toast('관리자 키 필요','err'); return; }
  if(!confirm('이 시간대를 삭제할까요?')) return;
  const {error}=await sbAdmin.from('time_slots').delete().eq('id',slotId);
  if(error){ toast('삭제 실패: '+error.message,'err'); return; }
  toast('삭제되었어요'); loadSlots();
}

async function apiAddSlot(f){
  if(!sbAdmin){ toast('관리자 키 필요','err'); return false; }
  const {error}=await sbAdmin.from('time_slots').insert({
    date:f.date, start_time:f.st, end_time:f.et,
    location:f.loc||'풀장', lesson_type:f.type||'기초 강습',
    max_participants:parseInt(f.max)||6, notes:f.notes||null
  });
  if(error){ toast('추가 실패: '+error.message,'err'); return false; }
  toast('시간대가 추가되었어요 🎉'); return true;
}

/* ═══════════════════════════════════════════════════════════════
   RENDER — SETUP PAGE
═══════════════════════════════════════════════════════════════ */
function rSetup(){
  return `
<div class="setup-wrap">
  <div class="setup-head">
    <div class="setup-biglogo">FREEDIVE</div>
    <div class="setup-tagline">강습 스케줄 & 예약 시스템</div>
  </div>
  <div class="setup-card">
    <div class="tabs">
      <button class="tabn on" data-tab="conn">Supabase 연결</button>
      <button class="tabn" data-tab="sql">SQL 설정 가이드</button>
    </div>

    <div id="tp-conn">
      <div class="step-head"><span class="step-num">1</span>Supabase 프로젝트 준비</div>
      <div class="step-desc">
        <a href="https://supabase.com" target="_blank" style="color:var(--cyan)">supabase.com</a>에서 무료 계정 생성 후,<br>
        새 프로젝트를 만드세요. 그 다음 "SQL 설정 가이드" 탭의<br>
        SQL을 복사해 SQL Editor에서 실행하세요.
      </div>
      <div class="step-head"><span class="step-num">2</span>Project URL 과 Anon Key 입력</div>
      <div class="step-desc">Supabase Dashboard → Settings → API 에서 확인하세요.</div>
      <div class="fg">
        <label class="fl">Project URL</label>
        <input class="fi" id="inp-url" placeholder="https://xxxx.supabase.co" />
      </div>
      <div class="fg">
        <label class="fl">Anon Key (공개 키)</label>
        <input class="fi" id="inp-anon" placeholder="eyJhbGci..." />
      </div>
      <div class="fg">
        <label class="fl">Service Role Key (관리자용 — 선택)</label>
        <input class="fi" id="inp-svc" placeholder="eyJhbGci... (나중에 입력 가능)" />
      </div>
      <button class="btn btn-primary btn-wide" id="btn-conn">연결하기 →</button>
    </div>

    <div id="tp-sql" style="display:none">
      <div class="step-desc">아래 SQL을 Supabase → SQL Editor에 붙여넣고 실행하세요.</div>
      <div class="codeblock" id="sql-code">${esc(SQL)}</div>
      <button class="btn btn-ghost btn-sm" style="margin-top:10px" id="btn-copy-sql">📋 SQL 복사</button>
    </div>
  </div>
</div>`;
}

/* ─── MAIN PAGE ─────────────────────────────────────────────── */
function rMain(){
  const body = S.loading
    ? `<div class="loading"><div class="spin"></div>불러오는 중...</div>`
    : S.slots.length===0
      ? `<div class="empty"><div class="empty-icon">🌊</div><div class="empty-ttl">등록된 시간대가 없어요</div><div class="empty-dsc">강사가 시간대를 추가하면 여기에 나타나요</div></div>`
      : `<div class="slots-grid">${S.slots.map(rSlotCard).join('')}</div>`;

  return `
${rHeader()}
<main>
  <div class="page-title">강습 스케줄</div>
  <div class="page-sub">원하는 시간대에 참여 의사를 남겨주세요 — 2명 이상 모이면 강습이 열려요 🤿</div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--txt3)"></div>모집 중</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>2명 이상 모집</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--cyan)"></div>강습 확정</div>
  </div>
  ${body}
</main>
${rJoinModal()}`;
}

function rSlotCard(slot){
  const av=slot.availability||[];
  const mine=av.find(a=>a.user_token===userToken);
  const n=av.length;
  const ready=(n>=2 && slot.status==='open');
  const conf=(slot.status==='confirmed');
  const d=fmtDate(slot.date);

  const statusEl=conf
    ? `<div class="card-status cs-confirmed">🤿 강습 확정</div>`
    : ready
      ? `<div class="card-status cs-ready">✓ 개설 가능</div>`
      : `<div class="card-status cs-open">모집 중</div>`;

  const countEl=conf
    ? `<span class="count-pill cp-full">${n}명 확정</span>`
    : ready
      ? `<span class="count-pill cp-ready">${n}명 모집됨</span>`
      : `<span class="count-pill cp-none">${n}명</span>`;

  const tags=av.length
    ? av.map(a=>`<span class="ptag${a.user_token===userToken?' mine':''}">${esc(a.name)}</span>`).join('')
    : `<span class="ptag-empty">아직 아무도 없어요</span>`;

  const actionBtn=conf?''
    : mine
      ? `<button class="btn btn-ghost btn-sm" data-a="leave" data-id="${slot.id}">참여 취소</button>`
      : `<button class="btn btn-primary btn-sm" data-a="join"  data-id="${slot.id}">🤿 나도 가능해요</button>`;

  return `
<div class="slot-card${ready?' ready':''}${conf?' confirmed':''}">
  ${statusEl}
  <div class="card-date-row">
    <div class="day-num">${d.day}</div>
    <div class="day-info">
      <div class="day-month">${d.month}</div>
      <div class="day-dow">${d.dow}</div>
    </div>
  </div>
  <div class="card-type">${esc(slot.lesson_type)}</div>
  <div class="card-meta">
    <div class="meta-item">⏱ ${fmt(slot.start_time)} ~ ${fmt(slot.end_time)}</div>
    <div class="meta-item">📍 ${esc(slot.location)}</div>
    ${slot.max_participants?`<div class="meta-item">최대 ${slot.max_participants}명</div>`:''}
  </div>
  ${slot.notes?`<div style="font-size:12px;color:var(--txt3);margin-bottom:10px;font-style:italic">${esc(slot.notes)}</div>`:''}
  <div class="ptcpt-section">
    <div class="ptcpt-header">
      <span class="ptcpt-label">참여 가능</span>
      ${countEl}
    </div>
    <div class="ptcpt-tags">${tags}</div>
  </div>
  <div class="card-foot">${actionBtn}</div>
</div>`;
}

function rJoinModal(){
  if(S.modal!=='join'||!S.selSlot) return '';
  const slot=S.slots.find(s=>s.id===S.selSlot); if(!slot) return '';
  const d=fmtDate(slot.date);
  return `
<div class="overlay on" id="ov-join">
  <div class="modal">
    <div class="modal-title">참여 가능 표시</div>
    <div class="modal-sub">${d.full} ${fmt(slot.start_time)} · ${esc(slot.lesson_type)}</div>
    <div class="fg">
      <label class="fl">이름 <span style="color:var(--red)">*</span></label>
      <input class="fi" id="j-name" placeholder="홍길동" />
    </div>
    <div class="fg">
      <label class="fl">연락처 (선택)</label>
      <input class="fi" id="j-contact" placeholder="010-0000-0000" />
    </div>
    <div class="modal-btns">
      <button class="btn btn-ghost" style="flex:1;justify-content:center" id="btn-jcancel">취소</button>
      <button class="btn btn-primary" style="flex:2;justify-content:center" id="btn-jsubmit">등록하기 →</button>
    </div>
  </div>
</div>`;
}

/* ─── ADMIN PAGE ────────────────────────────────────────────── */
function rAdmin(){
  const today=new Date().toISOString().split('T')[0];
  const all=S.slots; const upcoming=all.filter(s=>s.date>=today);
  const nConf=upcoming.filter(s=>s.status==='confirmed').length;
  const nReady=upcoming.filter(s=>(s.availability||[]).length>=2&&s.status==='open').length;

  const body=S.loading
    ?`<div class="loading"><div class="spin"></div>불러오는 중...</div>`
    :all.length===0
      ?`<div class="empty"><div class="empty-icon">🌊</div><div class="empty-ttl">시간대가 없어요</div><div class="empty-dsc">상단 "시간대 추가" 버튼으로 시작하세요</div></div>`
      :all.map(rAdminSlot).join('');

  return `
${rHeader(true)}
<main>
  <div class="stats-row">
    ${rStat('전체',upcoming.length+'개','var(--txt2)')}
    ${rStat('강습 확정',nConf+'개','var(--cyan)')}
    ${rStat('개설 가능',nReady+'개','var(--green)')}
  </div>
  ${body}
</main>
${rAddSlotModal()}`;
}

function rStat(lbl,val,clr){
  return `<div class="stat-card"><div class="stat-val" style="color:${clr}">${val}</div><div class="stat-lbl">${lbl}</div></div>`;
}

function rAdminSlot(slot){
  const av=slot.availability||[];
  const n=av.length;
  const ready=(n>=2&&slot.status==='open');
  const conf=(slot.status==='confirmed');
  const d=fmtDate(slot.date);
  const scolor=conf?'var(--cyan)':ready?'var(--green)':'var(--txt3)';
  const slabel=conf?'✓ 확정':ready?'✓ 개설 가능':'모집 중';

  const ptcptHtml=av.length
    ?`<div class="asl-ptcpt-list">
        ${av.map(a=>`<div class="ap-tag">${esc(a.name)}${a.contact?`<span class="ap-contact">${esc(a.contact)}</span>`:''}</div>`).join('')}
      </div>`
    :`<div style="font-size:12px;color:var(--txt3);font-style:italic">아직 없어요</div>`;

  return `
<div class="admin-slot">
  <div class="asl-head">
    <div>
      <div class="asl-title">
        ${d.full} · ${fmt(slot.start_time)} ~ ${fmt(slot.end_time)}
        <span style="font-size:12px;color:${scolor};margin-left:8px">${slabel}</span>
      </div>
      <div class="asl-meta">${esc(slot.lesson_type)} · ${esc(slot.location)} · 최대 ${slot.max_participants}명</div>
      ${slot.notes?`<div style="font-size:12px;color:var(--txt3);margin-top:3px">${esc(slot.notes)}</div>`:''}
    </div>
    <div class="asl-actions">
      ${!conf?`<button class="btn btn-success btn-sm" data-a="confirm" data-id="${slot.id}">강습 확정</button>`:''}
      <button class="btn btn-danger btn-sm" data-a="del" data-id="${slot.id}">삭제</button>
    </div>
  </div>
  <div style="font-size:12px;color:var(--txt3);margin-bottom:7px">
    참여 의사: ${n}명${n<2&&!conf?` <span style="color:var(--amber)">(${2-n}명 더 필요)</span>`:''}
  </div>
  ${ptcptHtml}
</div>`;
}

function rAddSlotModal(){
  if(S.modal!=='addslot') return '';
  const today=new Date().toISOString().split('T')[0];
  return `
<div class="overlay on" id="ov-addslot">
  <div class="modal">
    <div class="modal-title">시간대 추가</div>
    <div class="modal-sub">수강생들이 참여 가능 여부를 선택할 시간대를 만들어요</div>
    <div class="frow">
      <div class="fg"><label class="fl">날짜</label><input type="date" class="fi" id="s-date" min="${today}" value="${today}" /></div>
      <div class="fg"><label class="fl">최대 인원</label><input type="number" class="fi" id="s-max" value="6" min="1" max="30" /></div>
    </div>
    <div class="frow">
      <div class="fg"><label class="fl">시작 시간</label><input type="time" class="fi" id="s-st" value="10:00" /></div>
      <div class="fg"><label class="fl">종료 시간</label><input type="time" class="fi" id="s-et" value="12:00" /></div>
    </div>
    <div class="fg"><label class="fl">강습 종류</label><input class="fi" id="s-type" value="기초 강습" placeholder="기초 강습, 심화, 오픈워터..." /></div>
    <div class="fg"><label class="fl">장소</label><input class="fi" id="s-loc" value="풀장" placeholder="실내 풀장, 바다, 제주..." /></div>
    <div class="fg"><label class="fl">메모 (선택)</label><input class="fi" id="s-notes" placeholder="준비물, 특이사항..." /></div>
    <div class="modal-btns">
      <button class="btn btn-ghost" style="flex:1;justify-content:center" id="btn-ascancel">취소</button>
      <button class="btn btn-primary" style="flex:2;justify-content:center" id="btn-assubmit">추가하기 →</button>
    </div>
  </div>
</div>`;
}

/* ─── SHARED HEADER ─────────────────────────────────────────── */
function rHeader(admin=false){
  return `
<header>
  <div class="logo">FREEDIVE<small>강습 스케줄</small></div>
  <div class="header-actions">
    ${admin
      ?`<span class="admin-badge">관리자</span>
        <button class="btn btn-ghost btn-sm" id="btn-exit-admin">← 일반 보기</button>
        <button class="btn btn-primary btn-sm" id="btn-addslot-open">+ 시간대 추가</button>`
      :`<button class="btn btn-ghost btn-sm" id="btn-admin-mode">관리자 모드</button>
        <button class="btn btn-ghost btn-sm" id="btn-reset" title="설정 초기화">⚙</button>`
    }
  </div>
</header>`;
}

/* ═══════════════════════════════════════════════════════════════
   MAIN RENDER
═══════════════════════════════════════════════════════════════ */
function render(){
  let html;
  if(!cfg)           html=rSetup();
  else if(S.view==='admin') html=rAdmin();
  else               html=rMain();
  document.getElementById('app').innerHTML=html;
  bind();
}

/* ═══════════════════════════════════════════════════════════════
   EVENT BINDING
═══════════════════════════════════════════════════════════════ */
function bind(){
  const $=id=>document.getElementById(id);

  /* ── Setup page ── */
  qsa('.tabn').forEach(t=>t.addEventListener('click',()=>{
    qsa('.tabn').forEach(x=>x.classList.remove('on')); t.classList.add('on');
    const w=t.dataset.tab;
    sel('#tp-conn',`display:${w==='conn'?'':'none'}`);
    sel('#tp-sql', `display:${w==='sql' ?'':'none'}`);
  }));

  on('btn-conn', 'click', ()=>{
    const url=val('inp-url'), anon=val('inp-anon'), svc=val('inp-svc');
    if(!url||!anon){ toast('URL과 Anon Key를 입력해주세요','err'); return; }
    cfg={url,anonKey:anon}; lsJ('fd_cfg',cfg);
    if(svc){ admK=svc; ls('fd_adm',svc); }
    initSB(); loadSlots();
  });

  on('btn-copy-sql','click',()=>{
    navigator.clipboard.writeText(SQL).then(()=>toast('SQL이 복사되었어요!'));
  });

  /* ── Header ── */
  on('btn-admin-mode','click',()=>{
    if(!sbAdmin){
      const key=prompt('서비스 롤 키를 입력하세요\n(Supabase → Settings → API → service_role)');
      if(!key) return;
      admK=key; ls('fd_adm',key);
      sbAdmin=supabase.createClient(cfg.url,key);
    }
    S.view='admin'; render();
  });

  on('btn-exit-admin','click',()=>{ S.view='main'; render(); });

  on('btn-reset','click',()=>{
    if(!confirm('설정을 초기화하고 다시 연결할까요?')) return;
    ['fd_cfg','fd_adm'].forEach(k=>localStorage.removeItem(k));
    cfg=null; admK=''; sb=null; sbAdmin=null; render();
  });

  on('btn-addslot-open','click',()=>{ S.modal='addslot'; render(); });

  /* ── Slot card actions ── */
  qsa('[data-a="join"]').forEach(b=>b.addEventListener('click',()=>{
    S.selSlot=b.dataset.id; S.modal='join'; render();
  }));
  qsa('[data-a="leave"]').forEach(b=>b.addEventListener('click',async()=>{
    if(await apiLeave(b.dataset.id)) loadSlots();
  }));
  qsa('[data-a="confirm"]').forEach(b=>b.addEventListener('click',()=>apiConfirm(b.dataset.id)));
  qsa('[data-a="del"]').forEach(b=>b.addEventListener('click',()=>apiDelete(b.dataset.id)));

  /* ── Join modal ── */
  on('btn-jcancel','click',()=>closeModal());
  on('btn-jsubmit','click',async()=>{
    const name=val('j-name');
    if(!name){ toast('이름을 입력해주세요','err'); return; }
    const btn=$('btn-jsubmit'); if(btn) btn.disabled=true;
    const ok=await apiJoin(S.selSlot, name, val('j-contact'));
    if(btn) btn.disabled=false;
    if(ok){ closeModal(); loadSlots(); }
  });
  ovClose('ov-join');

  /* ── Add slot modal ── */
  on('btn-ascancel','click',()=>closeModal());
  on('btn-assubmit','click',async()=>{
    const f={
      date:val('s-date'), st:val('s-st'), et:val('s-et'),
      type:val('s-type'), loc:val('s-loc'),
      max:val('s-max'), notes:val('s-notes')
    };
    if(!f.date||!f.st){ toast('날짜와 시작 시간을 입력해주세요','err'); return; }
    const btn=$('btn-assubmit'); if(btn) btn.disabled=true;
    const ok=await apiAddSlot(f);
    if(btn) btn.disabled=false;
    if(ok){ closeModal(); loadSlots(); }
  });
  ovClose('ov-addslot');

  /* ── Enter key on inputs ── */
  on('j-name','keydown',e=>{ if(e.key==='Enter') $('btn-jsubmit')?.click(); });
  on('j-contact','keydown',e=>{ if(e.key==='Enter') $('btn-jsubmit')?.click(); });
  on('inp-url','keydown',e=>{ if(e.key==='Enter') $('btn-conn')?.click(); });
}

/* ── small utils ── */
function qsa(sel){ return document.querySelectorAll(sel); }
function on(id,ev,fn){ const el=document.getElementById(id); if(el) el.addEventListener(ev,fn); }
function val(id){ const el=document.getElementById(id); return el?el.value.trim():''; }
function sel(q,s){ const el=document.querySelector(q); if(el) el.setAttribute('style',s); }
function closeModal(){ S.modal=null; S.selSlot=null; render(); }
function ovClose(id){ const el=document.getElementById(id); if(el) el.addEventListener('click',e=>{ if(e.target===el) closeModal(); }); }

/* ═══════════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════════ */
initSB();
render();
if(cfg) loadSlots();
</script>
</body>
</html>
