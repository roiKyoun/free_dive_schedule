<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FreeDive — 강습 예약</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  --bg:#050e1a;--card:#0e2040;--card2:#112248;
  --cyan:#00c8ec;--purple:#a78bfa;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;
  --t1:#e4f2f8;--t2:#6da8c4;--t3:#3a5f78;
  --b:rgba(0,200,236,.1);--b2:rgba(0,200,236,.28);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--t1);font-family:'DM Sans',sans-serif;min-height:100vh;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 60% 50% at 10% 15%,rgba(0,200,236,.06) 0%,transparent 70%),
             radial-gradient(ellipse 50% 40% at 90% 85%,rgba(167,139,250,.05) 0%,transparent 70%);}

/* ── Header ── */
header{position:sticky;top:0;z-index:50;background:rgba(5,14,26,.94);
  backdrop-filter:blur(18px);border-bottom:1px solid var(--b);
  padding:12px 18px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--cyan);
  text-shadow:0 0 20px rgba(0,200,236,.45);line-height:1;}
.logo small{display:block;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:300;
  letter-spacing:2px;color:var(--t3);text-transform:uppercase;}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 15px;border-radius:9px;
  border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:all .18s;}
.btn-primary{background:var(--cyan);color:#050e1a;}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px);}
.btn-ghost{background:transparent;color:var(--t2);border:1px solid var(--b);}
.btn-ghost:hover{border-color:var(--b2);color:var(--t1);}
.btn-success{background:var(--green);color:#fff;}
.btn-success:hover{filter:brightness(1.08);}
.btn-danger{background:transparent;color:var(--red);border:1px solid rgba(239,68,68,.25);}
.btn-danger:hover{background:rgba(239,68,68,.1);}
.btn-sm{padding:5px 11px;font-size:12px;}
.btn-wide{width:100%;justify-content:center;}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important;filter:none!important;}

/* ── Main ── */
main{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:24px 14px 60px;}

/* ── Calendar nav ── */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.cal-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;}
.nav-btn{background:transparent;border:1px solid var(--b);color:var(--t2);
  border-radius:8px;padding:5px 14px;cursor:pointer;font-size:17px;transition:all .18s;}
.nav-btn:hover{border-color:var(--b2);color:var(--t1);}

/* ── Legend ── */
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px;}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t2);}
.leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

/* ── Calendar grid ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.dow{text-align:center;font-size:10px;font-weight:600;color:var(--t3);
  padding:5px 0;text-transform:uppercase;letter-spacing:.05em;}
.dow:first-child{color:#f87171;}
.dow:last-child{color:#60a5fa;}

.day{background:var(--card2);border:1px solid var(--b);border-radius:9px;
  padding:6px 5px;min-height:68px;cursor:pointer;transition:all .2s;
  display:flex;flex-direction:column;}
.day:hover{border-color:var(--b2);transform:translateY(-1px);}
.day.empty{background:transparent;border-color:transparent;cursor:default;pointer-events:none;}
.day.past{opacity:.45;}
.day.today .dn{color:var(--cyan);}
.day.has-data{border-color:rgba(0,200,236,.22);}
.day.has-ready{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.04);}
.day.has-confirmed{border-color:rgba(0,200,236,.45);background:rgba(0,200,236,.05);}

.dn{font-size:12px;font-weight:600;color:var(--t2);margin-bottom:3px;line-height:1;}
.day.has-data .dn{color:var(--t1);}

.day-tags{display:flex;flex-direction:column;gap:2px;flex:1;}
.dtag{font-size:9.5px;padding:1.5px 4px;border-radius:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5;}
.dtag-j{background:rgba(0,200,236,.12);color:var(--cyan);}
.dtag-p{background:rgba(167,139,250,.14);color:var(--purple);}
.dtag-ready{background:rgba(34,197,94,.15);color:var(--green);}
.dtag-conf{background:rgba(0,200,236,.2);color:var(--cyan);}

/* ── Modal ── */
.overlay{position:fixed;inset:0;z-index:200;background:rgba(5,14,26,.9);
  backdrop-filter:blur(10px);display:flex;align-items:flex-end;justify-content:center;
  padding:0;opacity:0;pointer-events:none;transition:opacity .22s;}
.overlay.on{opacity:1;pointer-events:all;}
@media(min-width:540px){.overlay{align-items:center;padding:16px;}}
.modal{background:var(--card2);border:1px solid var(--b2);
  border-radius:20px 20px 0 0;padding:20px 18px 32px;
  width:100%;max-width:460px;max-height:88vh;overflow-y:auto;
  transform:translateY(40px);transition:transform .25s cubic-bezier(.34,1.2,.64,1);}
@media(min-width:540px){.modal{border-radius:20px;transform:translateY(14px);}}
.overlay.on .modal{transform:translateY(0);}
.modal-handle{width:36px;height:3px;background:var(--t3);border-radius:2px;
  margin:0 auto 16px;display:block;}
@media(min-width:540px){.modal-handle{display:none;}}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;
  color:var(--cyan);margin-bottom:3px;}
.modal-sub{font-size:12px;color:var(--t2);margin-bottom:16px;}

/* ── Signup sections ── */
.sec-head{font-size:11px;font-weight:600;color:var(--t3);
  text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px;
  display:flex;align-items:center;gap:6px;}
.sec-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

.slot-group{margin-bottom:14px;}
.slot-row{display:flex;align-items:center;justify-content:space-between;
  padding:7px 10px;background:rgba(0,0,0,.22);border:1px solid var(--b);
  border-radius:8px;margin-bottom:4px;}
.slot-label{font-size:12px;font-weight:500;}
.slot-names{font-size:11px;color:var(--t2);margin-top:1px;}
.slot-count{font-size:11px;padding:2px 7px;border-radius:20px;font-weight:600;flex-shrink:0;}
.sc-ok{background:rgba(34,197,94,.15);color:var(--green);}
.sc-no{background:rgba(58,95,120,.2);color:var(--t3);}
.sc-conf{background:rgba(0,200,236,.15);color:var(--cyan);}

/* ── Form ── */
.fg{margin-bottom:12px;}
.fl{display:block;font-size:11px;font-weight:600;color:var(--t2);
  margin-bottom:5px;text-transform:uppercase;letter-spacing:.07em;}
.fi{width:100%;background:rgba(0,0,0,.35);border:1px solid var(--b);
  border-radius:10px;padding:10px 13px;color:var(--t1);
  font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .18s;}
.fi:focus{border-color:var(--cyan);}
.fi::placeholder{color:var(--t3);}
.fi-hint{font-size:11px;color:var(--t3);margin-top:4px;line-height:1.5;}

/* ── Checkbox slots ── */
.loc-block{margin-bottom:14px;}
.loc-title{font-size:12px;font-weight:600;padding:5px 10px;border-radius:7px;
  margin-bottom:7px;display:inline-flex;align-items:center;gap:5px;}
.lt-j{background:rgba(0,200,236,.1);color:var(--cyan);}
.lt-p{background:rgba(167,139,250,.1);color:var(--purple);}
.slot-checks{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.slot-check{display:flex;align-items:center;gap:7px;padding:8px 10px;
  background:rgba(0,0,0,.25);border:1px solid var(--b);border-radius:8px;
  cursor:pointer;transition:all .15s;user-select:none;}
.slot-check:hover{border-color:var(--b2);}
.slot-check.sel-j{background:rgba(0,200,236,.1);border-color:rgba(0,200,236,.4);}
.slot-check.sel-p{background:rgba(167,139,250,.1);border-color:rgba(167,139,250,.4);}
.slot-check input{display:none;}
.chk-box{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--t3);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.slot-check.sel-j .chk-box{background:var(--cyan);border-color:var(--cyan);color:#050e1a;}
.slot-check.sel-p .chk-box{background:var(--purple);border-color:var(--purple);}
.chk-label{font-size:12px;line-height:1.3;}
.chk-time{font-size:10px;color:var(--t3);margin-top:1px;}

/* ── Toast ── */
#toast{position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(70px);
  background:var(--card2);border:1px solid var(--b);border-radius:12px;
  padding:10px 20px;font-size:14px;z-index:400;white-space:nowrap;
  transition:transform .28s cubic-bezier(.34,1.56,.64,1);pointer-events:none;
  box-shadow:0 8px 30px rgba(0,0,0,.6);}
#toast.show{transform:translateX(-50%) translateY(0);}
#toast.ok{color:var(--green);border-color:rgba(34,197,94,.3);}
#toast.err{color:var(--red);border-color:rgba(239,68,68,.3);}

/* ── Setup ── */
.setup-wrap{max-width:460px;margin:50px auto;padding:0 14px;}
.setup-logo{font-family:'Bebas Neue',sans-serif;font-size:50px;letter-spacing:5px;
  color:var(--cyan);text-shadow:0 0 36px rgba(0,200,236,.5);text-align:center;}
.setup-tag{text-align:center;font-size:13px;color:var(--t2);font-weight:300;
  letter-spacing:.5px;margin:4px 0 26px;}
.setup-card{background:var(--card2);border:1px solid var(--b);border-radius:20px;padding:26px;}
.tabs{display:flex;border-bottom:1px solid var(--b);margin-bottom:18px;}
.tabn{padding:7px 13px;font-size:13px;cursor:pointer;color:var(--t3);
  border-bottom:2px solid transparent;background:none;border-top:none;
  border-left:none;border-right:none;font-family:'DM Sans',sans-serif;transition:all .18s;}
.tabn.on{color:var(--cyan);border-bottom-color:var(--cyan);}
.step-n{display:inline-flex;align-items:center;justify-content:center;
  width:19px;height:19px;background:var(--cyan);color:#050e1a;
  border-radius:50%;font-size:10px;font-weight:700;margin-right:6px;}
.step-h{font-size:13px;font-weight:600;margin-bottom:5px;}
.step-d{font-size:12px;color:var(--t2);margin-bottom:11px;line-height:1.65;}
.codeblock{background:rgba(0,0,0,.5);border:1px solid var(--b);border-radius:10px;
  padding:11px;font-size:10px;font-family:monospace;color:var(--t2);
  white-space:pre;overflow-x:auto;line-height:1.65;max-height:200px;overflow-y:auto;}

/* ── Admin ── */
.admin-badge{background:rgba(245,158,11,.14);border:1px solid rgba(245,158,11,.28);
  color:var(--amber);font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;}
.admin-day-block{background:var(--card2);border:1px solid var(--b);
  border-radius:14px;padding:16px;margin-bottom:12px;}
.adb-date{font-size:15px;font-weight:600;margin-bottom:12px;}
.adb-slot{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;
  padding:10px 12px;border:1px solid var(--b);border-radius:9px;margin-bottom:6px;}
.adb-slot.ready{border-color:rgba(34,197,94,.35);background:rgba(34,197,94,.04);}
.adb-slot.confirmed{border-color:rgba(0,200,236,.35);background:rgba(0,200,236,.04);}
.adb-info{flex:1;}
.adb-slot-name{font-size:13px;font-weight:500;}
.adb-people{font-size:12px;color:var(--t2);margin-top:3px;}
.adb-actions{display:flex;gap:6px;align-items:center;}
.conf-pill{font-size:11px;padding:2px 9px;border-radius:20px;
  background:rgba(0,200,236,.12);color:var(--cyan);font-weight:600;}

@media(max-width:480px){
  .cal-grid{gap:2px;}
  .day{min-height:58px;padding:5px 4px;}
  .dn{font-size:11px;}
  .slot-checks{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<script>
/* ════════════════════════════════════════
   장소 & 시간대 설정
════════════════════════════════════════ */
const LOC = {
  jamsil: {
    key:'jamsil', name:'잠실 풀장', short:'잠실', cls:'lt-j', tagCls:'dtag-j',
    selCls:'sel-j', color:'var(--cyan)',
    slots(dateStr){
      const dow = new Date(dateStr+'T12:00:00').getDay();
      const weekend = dow===0||dow===6;
      return weekend
        ? [{id:'1부',time:'오전 10:00'},{id:'2부',time:'오후 14:00'}]
        : [{id:'1부',time:'오전 10:00'},{id:'2부',time:'오후 14:00'},{id:'3부',time:'오후 18:00'}];
    }
  },
  paradive: {
    key:'paradive', name:'파라다이브', short:'파라', cls:'lt-p', tagCls:'dtag-p',
    selCls:'sel-p', color:'var(--purple)',
    slots(){
      return [
        {id:'1부',time:'08:00~11:00'},{id:'2부',time:'11:00~14:00'},
        {id:'3부',time:'14:00~17:00'},{id:'4부',time:'17:00~20:00'},{id:'5부',time:'20:00~23:00'}
      ];
    }
  }
};

/* ════════════════════════════════════════
   SQL 설정
════════════════════════════════════════ */
const SQL = `-- 기존 테이블 제거
drop table if exists confirmed_lessons;
drop table if exists availability;

-- 참여 희망 테이블
create table availability (
  id          uuid default gen_random_uuid() primary key,
  wish_date   date not null,
  location    text not null,
  time_slot   text not null,
  name        text not null,
  contact     text,
  password    text not null,
  created_at  timestamptz default now(),
  unique(wish_date, location, time_slot, name)
);

-- 확정 강습 테이블
create table confirmed_lessons (
  id          uuid default gen_random_uuid() primary key,
  lesson_date date not null,
  location    text not null,
  time_slot   text not null,
  note        text,
  created_at  timestamptz default now(),
  unique(lesson_date, location, time_slot)
);

-- 보안 설정
alter table availability       enable row level security;
alter table confirmed_lessons  enable row level security;

create policy "읽기_av"   on availability      for select using (true);
create policy "쓰기_av"   on availability      for insert with check (true);
create policy "삭제_av"   on availability      for delete using (true);
create policy "읽기_cl"   on confirmed_lessons for select using (true);`;

/* ════════════════════════════════════════
   STATE
════════════════════════════════════════ */
let sb=null, sbAdmin=null;

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ▼▼▼ 여기에 Supabase 키를 넣으세요 ▼▼▼
   url    : Supabase 프로젝트 URL
   anonKey: Settings → API Keys → Legacy 탭 → anon key (eyJ...로 시작)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const PRESET = {
  url:     'https://azbkjduhazribkutpttz.supabase.co',
  anonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6YmtqZHVoYXpyaWJrdXRwdHR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MjQ5NTAsImV4cCI6MjA5NjUwMDk1MH0.iRgtBg5Bhyf3VoltueO4D7TKoSpedCDeeqVgxMZBdMY'   // ← 여기에 anon key 붙여넣기
};
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

let cfg = lsJ('fd_cfg') || (PRESET.anonKey ? PRESET : null);
let admK = ls('fd_adm') || '';
let curYear = new Date().getFullYear();
let curMonth = new Date().getMonth();
let monthData = { av:[], confirmed:[] };
let S = { view:'main', modal:null, selDate:null, selAv:null };

/* ════════════════════════════════════════
   UTILS
════════════════════════════════════════ */
function ls(k,v){if(v!==undefined){localStorage.setItem(k,v);return v;}return localStorage.getItem(k);}
function lsJ(k,v){if(v!==undefined){localStorage.setItem(k,JSON.stringify(v));return v;}try{return JSON.parse(localStorage.getItem(k));}catch{return null;}}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(m,t='ok'){const e=document.getElementById('toast');e.textContent=m;e.className='show '+t;setTimeout(()=>e.className='',2800);}
const DOW=['일','월','화','수','목','금','토'];
const MON=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
function dStr(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function todayStr(){return new Date().toISOString().split('T')[0];}
function fmtDate(ds){const d=new Date(ds+'T12:00:00');return`${d.getMonth()+1}월 ${d.getDate()}일 (${DOW[d.getDay()]})`;}

// Build lookup: date → location → slot → [{name, id, contact}]
function buildMap(){
  const map={};
  monthData.av.forEach(r=>{
    if(!map[r.wish_date])map[r.wish_date]={};
    if(!map[r.wish_date][r.location])map[r.wish_date][r.location]={};
    if(!map[r.wish_date][r.location][r.time_slot])map[r.wish_date][r.location][r.time_slot]=[];
    map[r.wish_date][r.location][r.time_slot].push({id:r.id,name:r.name,contact:r.contact,password:r.password});
  });
  return map;
}
function buildConfMap(){
  const m={};
  monthData.confirmed.forEach(r=>{
    const k=`${r.lesson_date}|${r.location}|${r.time_slot}`;
    m[k]=true;
  });
  return m;
}

/* ════════════════════════════════════════
   SUPABASE
════════════════════════════════════════ */
function initSB(){
  if(!cfg)return;
  sb=supabase.createClient(cfg.url,cfg.anonKey);
  if(admK)sbAdmin=supabase.createClient(cfg.url,admK);
}

async function loadMonth(){
  if(!sb){render();return;}
  const from=dStr(curYear,curMonth,1);
  const to=dStr(curMonth===11?curYear+1:curYear,curMonth===11?0:curMonth+1,1);
  const [r1,r2]=await Promise.all([
    sb.from('availability').select('*').gte('wish_date',from).lt('wish_date',to),
    sb.from('confirmed_lessons').select('*').gte('lesson_date',from).lt('lesson_date',to)
  ]);
  if(r1.error){
    if(r1.error.code==='42P01')toast('⚠ Supabase SQL을 먼저 실행해주세요!','err');
    else toast('로드 실패','err');
    monthData={av:[],confirmed:[]};render();return;
  }
  monthData={av:r1.data||[],confirmed:r2.data||[]};
  render();
}

async function apiSignup(date,slots,name,contact,pw){
  // slots = [{location:'jamsil',slot:'1부'}, ...]
  const rows=slots.map(s=>({wish_date:date,location:s.loc,time_slot:s.slot,name,contact:contact||null,password:pw}));
  const{error}=await sb.from('availability').upsert(rows,{onConflict:'wish_date,location,time_slot,name',ignoreDuplicates:true});
  if(error){toast('신청 실패: '+error.message,'err');return false;}
  toast('신청 완료! 🤿');return true;
}

async function apiDelete(id,enteredPw){
  // Find in local data to check pw
  const row=monthData.av.find(r=>r.id===id);
  if(!row){toast('데이터를 찾을 수 없어요','err');return false;}
  if(row.password!==enteredPw){toast('비밀번호가 틀렸어요 ❌','err');return false;}
  const{error}=await sb.from('availability').delete().eq('id',id);
  if(error){toast('삭제 실패','err');return false;}
  toast('취소됐어요');return true;
}

async function apiConfirm(date,loc,slot){
  if(!sbAdmin){toast('관리자 키 필요','err');return;}
  const{error}=await sbAdmin.from('confirmed_lessons')
    .upsert({lesson_date:date,location:loc,time_slot:slot},{onConflict:'lesson_date,location,time_slot',ignoreDuplicates:true});
  if(error){toast('확정 실패: '+error.message,'err');return;}
  toast('강습 확정됐어요 ✓');await loadMonth();
}

async function apiUnconfirm(date,loc,slot){
  if(!sbAdmin){toast('관리자 키 필요','err');return;}
  await sbAdmin.from('confirmed_lessons')
    .delete().eq('lesson_date',date).eq('location',loc).eq('time_slot',slot);
  toast('확정 취소됐어요');await loadMonth();
}

/* ════════════════════════════════════════
   RENDER — CALENDAR
════════════════════════════════════════ */
function rCalendar(){
  const avMap=buildMap();
  const confMap=buildConfMap();
  const today=todayStr();
  const firstDow=new Date(curYear,curMonth,1).getDay();
  const daysInMonth=new Date(curYear,curMonth+1,0).getDate();

  let cells='';
  DOW.forEach(d=>{cells+=`<div class="dow">${d}</div>`;});
  for(let i=0;i<firstDow;i++)cells+=`<div class="day empty"></div>`;

  for(let d=1;d<=daysInMonth;d++){
    const ds=dStr(curYear,curMonth,d);
    const dayAv=avMap[ds]||{};
    const isToday=ds===today;
    const isPast=ds<today;

    // compute tags
    let hasData=false,hasReady=false,hasConf=false;
    let tags='<div class="day-tags">';

    for(const [locKey,loc] of Object.entries(LOC)){
      const locAv=dayAv[locKey]||{};
      const slots=Object.keys(locAv);
      if(slots.length===0)continue;
      hasData=true;
      let maxCount=0,anyConf=false;
      slots.forEach(sl=>{
        const cnt=locAv[sl].length;
        if(cnt>maxCount)maxCount=cnt;
        if(confMap[`${ds}|${locKey}|${sl}`])anyConf=true;
      });
      if(anyConf){hasConf=true;}
      if(maxCount>=2){hasReady=true;}
      const totalPeople=new Set(slots.flatMap(sl=>locAv[sl].map(x=>x.name))).size;
      let tc=loc.tagCls;
      if(anyConf)tc='dtag-conf';
      else if(maxCount>=2)tc='dtag-ready';
      tags+=`<div class="dtag ${tc}">${loc.short} ${totalPeople}명</div>`;
    }
    tags+='</div>';

    let cls='day';
    if(hasConf)cls+=' has-confirmed';
    else if(hasReady)cls+=' has-ready';
    else if(hasData)cls+=' has-data';
    if(isToday)cls+=' today';
    if(isPast)cls+=' past';

    cells+=`<div class="${cls}" data-date="${ds}"><div class="dn">${d}</div>${tags}</div>`;
  }

  const adminAddBtn=S.view==='admin'
    ?`<button class="btn btn-primary btn-sm" style="margin-left:auto" id="btn-view-all">전체 신청 현황</button>`:'';

  return`
${rHeader(S.view==='admin')}
<main>
  <div class="cal-nav">
    <button class="nav-btn" id="btn-prev">‹</button>
    <div class="cal-title">${curYear}년 ${MON[curMonth]}</div>
    <button class="nav-btn" id="btn-next">›</button>
  </div>
  <div style="display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px">
    <div class="legend">
      <div class="leg"><div class="leg-dot" style="background:var(--t3)"></div>신청 있음</div>
      <div class="leg"><div class="leg-dot" style="background:var(--green)"></div>2명 이상</div>
      <div class="leg"><div class="leg-dot" style="background:var(--cyan)"></div>강습 확정</div>
    </div>
    ${adminAddBtn}
  </div>
  <div class="cal-grid">${cells}</div>
</main>
${rModal()}`;}

/* ════════════════════════════════════════
   RENDER — MODAL
════════════════════════════════════════ */
function rModal(){
  if(!S.modal)return'';

  /* ── Day detail ── */
  if(S.modal==='detail'&&S.selDate){
    const ds=S.selDate;
    const avMap=buildMap();
    const confMap=buildConfMap();
    const dayAv=avMap[ds]||{};
    const dateLabel=fmtDate(ds);

    let sections='';
    for(const [locKey,loc] of Object.entries(LOC)){
      const locAv=dayAv[locKey]||{};
      const slots=loc.slots(ds);
      let rows='';
      let hasAny=false;
      slots.forEach(sl=>{
        const people=locAv[sl.id]||[];
        const isConf=confMap[`${ds}|${locKey}|${sl.id}`];
        if(people.length===0&&!isConf)return;
        hasAny=true;
        const ready=people.length>=2;
        let rowCls='adb-slot';
        if(isConf)rowCls+=' confirmed';
        else if(ready)rowCls+=' ready';
        const countCls=isConf?'sc-conf':ready?'sc-ok':'sc-no';
        const countLabel=isConf?'✓ 확정':`${people.length}명`;
        const names=people.map(p=>`<span style="cursor:pointer;text-decoration:underline;text-decoration-color:rgba(255,255,255,.2)" data-del-id="${p.id}" data-del-name="${esc(p.name)}">${esc(p.name)}</span>`).join(', ');
        rows+=`<div class="${rowCls}">
          <div class="adb-info">
            <div class="adb-slot-name">${sl.id} <span style="font-size:11px;color:var(--t2)">${sl.time}</span></div>
            ${people.length>0?`<div class="adb-people">${names}</div>`:''}
          </div>
          <span class="slot-count ${countCls}">${countLabel}</span>
        </div>`;
      });
      if(!hasAny)continue;
      sections+=`<div style="margin-bottom:14px">
        <div class="sec-head"><div class="sec-dot" style="background:${loc.color}"></div>${loc.name}</div>
        ${rows}
      </div>`;
    }

    const hasAnyData=Object.values(dayAv).some(l=>Object.values(l).some(s=>s.length>0));

    return`<div class="overlay on" id="ov"><div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">${dateLabel}</div>
      <div class="modal-sub">날짜를 클릭한 사람들의 신청 현황이에요<br><small style="color:var(--t3)">이름을 클릭하면 본인 신청을 취소할 수 있어요</small></div>
      ${hasAnyData?sections:`<div style="text-align:center;padding:20px;color:var(--t3);font-size:13px">아직 신청한 사람이 없어요</div>`}
      <button class="btn btn-primary btn-wide" id="btn-go-signup" style="margin-bottom:8px">🤿 나도 신청하기</button>
      <button class="btn btn-ghost btn-wide" id="btn-mc">닫기</button>
    </div></div>`;}

  /* ── Signup form ── */
  if(S.modal==='signup'&&S.selDate){
    const ds=S.selDate;
    let locBlocks='';
    for(const [locKey,loc] of Object.entries(LOC)){
      const slots=loc.slots(ds);
      const checks=slots.map(sl=>`
        <label class="slot-check" data-loc="${locKey}" data-slot="${sl.id}">
          <div class="chk-box">✓</div>
          <div><div class="chk-label">${sl.id}</div><div class="chk-time">${sl.time}</div></div>
        </label>`).join('');
      locBlocks+=`<div class="loc-block">
        <div class="loc-title ${loc.cls}">${loc.name}</div>
        <div class="slot-checks">${checks}</div>
      </div>`;
    }
    return`<div class="overlay on" id="ov"><div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">참여 희망 신청</div>
      <div class="modal-sub">${fmtDate(ds)} · 가능한 시간 모두 선택하세요</div>
      ${locBlocks}
      <div style="height:1px;background:var(--b);margin:12px 0"></div>
      <div class="fg"><label class="fl">이름 <span style="color:var(--red)">*</span></label>
        <input class="fi" id="s-name" placeholder="홍길동"/></div>
      <div class="fg"><label class="fl">연락처 (선택)</label>
        <input class="fi" id="s-contact" placeholder="010-0000-0000"/></div>
      <div class="fg"><label class="fl">비밀번호 <span style="color:var(--red)">*</span></label>
        <input class="fi" id="s-pw" type="password" placeholder="나중에 취소할 때 필요해요"/>
        <div class="fi-hint">⚠ 신청 취소 시 필요합니다. 꼭 기억하세요!</div></div>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="btn btn-ghost" style="flex:1;justify-content:center" id="btn-back">← 뒤로</button>
        <button class="btn btn-primary" style="flex:2;justify-content:center" id="btn-submit">신청하기 →</button>
      </div>
    </div></div>`;}

  /* ── Delete confirm ── */
  if(S.modal==='del'&&S.selAv){
    return`<div class="overlay on" id="ov"><div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">신청 취소</div>
      <div class="modal-sub">${esc(S.selAv.name)}님의 신청을 취소할게요</div>
      <div class="fg"><label class="fl">비밀번호 확인</label>
        <input class="fi" id="del-pw" type="password" placeholder="신청 시 입력한 비밀번호"/></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost" style="flex:1;justify-content:center" id="btn-mc">취소</button>
        <button class="btn btn-danger" style="flex:2;justify-content:center" id="btn-del-ok">취소 확인</button>
      </div>
    </div></div>`;}

  /* ── Admin: all signups ── */
  if(S.modal==='admin-all'){
    const avMap=buildMap();
    const confMap=buildConfMap();
    const today=todayStr();
    const dates=Object.keys(avMap).filter(d=>d>=today).sort();

    if(dates.length===0){
      return`<div class="overlay on" id="ov"><div class="modal">
        <div class="modal-handle"></div>
        <div class="modal-title">전체 신청 현황</div>
        <div style="text-align:center;padding:30px;color:var(--t3)">아직 신청이 없어요</div>
        <button class="btn btn-ghost btn-wide" id="btn-mc">닫기</button>
      </div></div>`;}

    let content='';
    dates.forEach(ds=>{
      const dayAv=avMap[ds];
      let slotRows='';
      let hasReady=false;
      for(const [locKey,loc] of Object.entries(LOC)){
        const locAv=dayAv[locKey]||{};
        const slots=loc.slots(ds);
        slots.forEach(sl=>{
          const people=locAv[sl.id]||[];
          if(people.length===0)return;
          const isConf=confMap[`${ds}|${locKey}|${sl.id}`];
          const ready=people.length>=2;
          if(ready&&!isConf)hasReady=true;
          let rowCls='adb-slot';
          if(isConf)rowCls+=' confirmed';
          else if(ready)rowCls+=' ready';
          const nameList=people.map(p=>`${p.name}${p.contact?` (${p.contact})`:''}`).join(', ');
          const adminBtns=isConf
            ?`<button class="btn btn-ghost btn-sm" data-unconf="${ds}" data-loc="${locKey}" data-slot="${sl.id}">확정 취소</button>`
            :ready?`<button class="btn btn-success btn-sm" data-conf="${ds}" data-loc="${locKey}" data-slot="${sl.id}">강습 확정</button>`:'';
          slotRows+=`<div class="${rowCls}" style="gap:8px">
            <div class="adb-info" style="min-width:0">
              <div class="adb-slot-name" style="font-size:12px">${loc.short} ${sl.id} <span style="color:var(--t2)">${sl.time}</span></div>
              <div class="adb-people">${esc(nameList)}</div>
            </div>
            <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
              ${isConf?`<span class="conf-pill">✓ 확정</span>`:ready?`<span class="slot-count sc-ok">${people.length}명</span>`:`<span class="slot-count sc-no">${people.length}명</span>`}
              ${adminBtns}
            </div>
          </div>`;
        });
      }
      if(!slotRows)return;
      content+=`<div class="admin-day-block">
        <div class="adb-date">${fmtDate(ds)}${hasReady?' <span style="font-size:11px;color:var(--green)">● 개설 가능</span>':''}</div>
        ${slotRows}
      </div>`;
    });

    return`<div class="overlay on" id="ov"><div class="modal" style="max-width:520px">
      <div class="modal-handle"></div>
      <div class="modal-title">전체 신청 현황</div>
      <div class="modal-sub" style="margin-bottom:16px">${monthData.av.length}건 신청 · 2명 이상인 항목에 강습 확정 버튼이 나와요</div>
      ${content||'<div style="text-align:center;padding:20px;color:var(--t3)">이번 달 신청이 없어요</div>'}
      <button class="btn btn-ghost btn-wide" style="margin-top:8px" id="btn-mc">닫기</button>
    </div></div>`;}

  return'';}

/* ════════════════════════════════════════
   RENDER MAIN
════════════════════════════════════════ */
function render(){
  document.getElementById('app').innerHTML=cfg?rCalendar():rSetup();
  bind();
}

/* ════════════════════════════════════════
   EVENTS
════════════════════════════════════════ */
function bind(){
  const $=id=>document.getElementById(id);
  const on=(id,ev,fn)=>{const el=$(id);if(el)el.addEventListener(ev,fn);};
  const val=id=>{const el=$(id);return el?el.value.trim():'';};
  const close=()=>{S.modal=null;S.selAv=null;render();};

  /* tabs */
  document.querySelectorAll('.tabn').forEach(t=>t.addEventListener('click',()=>{
    document.querySelectorAll('.tabn').forEach(x=>x.classList.remove('on'));t.classList.add('on');
    const w=t.dataset.tab;
    const cc=$('tp-conn'),cs=$('tp-sql');
    if(cc)cc.style.display=w==='conn'?'':'none';
    if(cs)cs.style.display=w==='sql'?'':'none';
  }));

  /* setup */
  on('btn-conn','click',()=>{
    const url=val('inp-url'),anon=val('inp-anon'),svc=val('inp-svc');
    if(!url||!anon){toast('URL과 Anon Key를 입력해주세요','err');return;}
    cfg={url,anonKey:anon};lsJ('fd_cfg',cfg);
    if(svc){admK=svc;ls('fd_adm',svc);}
    initSB();loadMonth();
  });
  on('btn-copy-sql','click',()=>navigator.clipboard.writeText(SQL).then(()=>toast('SQL 복사됐어요!')));

  /* header */
  on('btn-admin','click',()=>{
    const k=prompt('서비스 롤 키 입력 (Settings → API Keys → Legacy → service_role)');
    if(!k)return;admK=k;ls('fd_adm',k);
    sbAdmin=supabase.createClient(cfg.url,k);
    S.view='admin';render();
  });
  on('btn-exit','click',()=>{S.view='main';S.modal=null;render();});
  on('btn-reset','click',()=>{
    if(!confirm('설정 초기화할까요?'))return;
    ['fd_cfg','fd_adm'].forEach(k=>localStorage.removeItem(k));
    cfg=null;admK='';sb=null;sbAdmin=null;render();
  });
  on('btn-view-all','click',()=>{S.modal='admin-all';render();});

  /* nav */
  on('btn-prev','click',()=>{if(curMonth===0){curMonth=11;curYear--;}else curMonth--;loadMonth();});
  on('btn-next','click',()=>{if(curMonth===11){curMonth=0;curYear++;}else curMonth++;loadMonth();});

  /* day click */
  document.querySelectorAll('.day:not(.empty)').forEach(cell=>{
    cell.addEventListener('click',()=>{
      S.selDate=cell.dataset.date;S.modal='detail';render();
    });
  });

  /* detail modal */
  on('btn-go-signup','click',()=>{S.modal='signup';render();});
  on('btn-mc','click',close);
  on('btn-back','click',()=>{S.modal='detail';render();});

  /* delete from detail */
  document.querySelectorAll('[data-del-id]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      S.selAv={id:el.dataset.delId,name:el.dataset.delName};
      S.modal='del';render();
    });
  });

  /* slot checkboxes */
  document.querySelectorAll('.slot-check').forEach(el=>{
    el.addEventListener('click',()=>{
      const loc=LOC[el.dataset.loc];
      el.classList.toggle(loc.selCls);
    });
  });

  /* signup submit */
  on('btn-submit','click',async()=>{
    const name=val('s-name'),pw=val('s-pw');
    if(!name){toast('이름을 입력해주세요','err');return;}
    if(!pw){toast('비밀번호를 입력해주세요','err');return;}
    const selected=[];
    document.querySelectorAll('.slot-check').forEach(el=>{
      const loc=LOC[el.dataset.loc];
      if(el.classList.contains(loc.selCls)){
        selected.push({loc:el.dataset.loc,slot:el.dataset.slot});
      }
    });
    if(selected.length===0){toast('시간대를 하나 이상 선택해주세요','err');return;}
    const btn=$('btn-submit');if(btn)btn.disabled=true;
    const ok=await apiSignup(S.selDate,selected,name,val('s-contact'),pw);
    if(btn)btn.disabled=false;
    if(ok){S.modal='detail';await loadMonth();}
  });

  /* delete confirm */
  on('btn-del-ok','click',async()=>{
    const pw=val('del-pw');
    const btn=$('btn-del-ok');if(btn)btn.disabled=true;
    const ok=await apiDelete(S.selAv.id,pw);
    if(btn)btn.disabled=false;
    if(ok){S.modal='detail';await loadMonth();}
  });
  on('del-pw','keydown',e=>{if(e.key==='Enter')$('btn-del-ok')?.click();});
  on('s-pw','keydown',e=>{if(e.key==='Enter')$('btn-submit')?.click();});

  /* admin confirm/unconfirm */
  document.querySelectorAll('[data-conf]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      btn.disabled=true;
      await apiConfirm(btn.dataset.conf,btn.dataset.loc,btn.dataset.slot);
      btn.disabled=false;
    });
  });
  document.querySelectorAll('[data-unconf]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      btn.disabled=true;
      await apiUnconfirm(btn.dataset.unconf,btn.dataset.loc,btn.dataset.slot);
      btn.disabled=false;
    });
  });

  /* overlay backdrop */
  const ov=$('ov');
  if(ov)ov.addEventListener('click',e=>{if(e.target===ov)close();});
}

/* ════════════════════════════════════════
   INIT
════════════════════════════════════════ */
initSB();render();
if(cfg)loadMonth();
</script>
